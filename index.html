  <script>
    window.__FIREVAULT_BOOTED = false;
    window.__FIREVAULT_MODULE_READY = false;
    window.__FIREVAULT_SPLASH_STARTED = Date.now();
    window.__FIREVAULT_MIN_SPLASH_MS = 5000;
    window.__FIREVAULT_TERMINAL_0732 = { databaseCount:null, versionState:null, started:false };
    window.fireVaultSplashDatabaseReady0732 = function(count){
      window.__FIREVAULT_TERMINAL_0732.databaseCount = Number.isFinite(Number(count)) ? Number(count) : 0;
    };
    window.fireVaultSplashVersionReady0732 = function(state){
      window.__FIREVAULT_TERMINAL_0732.versionState = String(state || "CURRENT").toUpperCase();
    };
    window.fireVaultTypeText0732 = function(element,text,speed){
      return new Promise(function(resolve){
        if(!element){ resolve(); return; }
        const value=String(text || "").toUpperCase();
        element.textContent="";
        let index=0;
        function step(){
          if(index<value.length){
            element.textContent += value.charAt(index++);
            window.setTimeout(step, Math.max(12,Number(speed)||44));
          }else resolve();
        }
        step();
      });
    };
    window.fireVaultAppendText0732 = function(element,text,speed){
      return new Promise(function(resolve){
        if(!element){ resolve(); return; }
        const value=String(text || "").toUpperCase();
        let index=0;
        function step(){
          if(index<value.length){
            element.textContent += value.charAt(index++);
            window.setTimeout(step, Math.max(10,Number(speed)||24));
          }else resolve();
        }
        step();
      });
    };
    window.fireVaultWaitFor0732 = function(test,timeout){
      return new Promise(function(resolve){
        const started=Date.now();
        (function check(){
          if(test() || Date.now()-started >= timeout){ resolve(); return; }
          window.setTimeout(check,25);
        })();
      });
    };
    window.fireVaultRunSplashTerminal0732 = async function(){
      const state=window.__FIREVAULT_TERMINAL_0732;
      if(state.started) return;
      state.started=true;
      const dbLine=document.getElementById("splashDbLine0732");
      const dbText=document.getElementById("splashDbText0732");
      const versionLine=document.getElementById("splashVersionLine0732");
      const versionText=document.getElementById("splashVersionText0732");
      await window.fireVaultTypeText0732(dbText,"CHECKING DATABASE",46);
      await window.fireVaultWaitFor0732(function(){ return state.databaseCount !== null; },1600);
      await window.fireVaultAppendText0732(dbText," ... OK • "+(state.databaseCount === null ? 0 : state.databaseCount)+" ACCOUNTS",18);
      dbLine && dbLine.classList.add("isComplete");
      if(versionLine){ versionLine.classList.remove("isWaiting"); versionLine.classList.add("isVisible"); }
      await window.fireVaultTypeText0732(versionText,"CHECKING LATEST VERSION",42);
      await window.fireVaultWaitFor0732(function(){ return state.versionState !== null; },2600);
      await window.fireVaultAppendText0732(versionText," ... "+(state.versionState || "OFFLINE READY"),18);
      versionLine && versionLine.classList.add("isComplete");
    };
    window.setTimeout(window.fireVaultRunSplashTerminal0732,90);
    window.addEventListener('error', function(e){ window.__FIREVAULT_LAST_ERROR = e.message || String(e.error || e); });
    window.addEventListener('unhandledrejection', function(e){ window.__FIREVAULT_LAST_ERROR = String(e.reason || e); });
    setTimeout(function(){
      var app = document.getElementById('app');
      var stillOnSplash = app && app.querySelector && app.querySelector('.splashScreen457, .splashScreen492');
      if (!window.__FIREVAULT_MODULE_READY && app && (stillOnSplash || /Loading FireVault/i.test(app.textContent || ''))) {
        app.innerHTML = '<div class="screen"><div class="card errorBox"><h1>FireVault did not finish loading</h1><p>The app JavaScript module did not load. Try Reload App. If it continues, clear the browser/PWA cache and reinstall this build.</p><p>' + (window.__FIREVAULT_LAST_ERROR || 'No browser error was reported.') + '</p><button class="primary" onclick="location.reload()">Reload App</button></div></div>';
      }
    }, 9000);
    setTimeout(function(){
      var app = document.getElementById('app');
      var stillOnSplash = app && app.querySelector && app.querySelector('.splashScreen457, .splashScreen492');
      if (window.__FIREVAULT_MODULE_READY && !window.__FIREVAULT_BOOTED && app && stillOnSplash) {
        app.innerHTML = '<div class="screen"><div class="card errorBox"><h1>FireVault started but did not open</h1><p>The module loaded, but the app did not leave the splash screen. Try Reload App.</p><p>' + (window.__FIREVAULT_LAST_ERROR || 'No browser error was reported.') + '</p><button class="primary" onclick="location.reload()">Reload App</button></div></div>';
      }
    }, 11000);
  </script>

  <script>
    window.FIREVAULT_BUILD = "0.78.3";
    window.FIREVAULT_UPDATE = { registration:null, waiting:null, checking:false };
    window.fireVaultCheckForUpdates = async function(options){
      options = options || {};
      if (!("serviceWorker" in navigator)) return {supported:false};
      if (window.FIREVAULT_UPDATE.checking) return {checking:true};
      window.FIREVAULT_UPDATE.checking = true;
      try {
        const reg = window.FIREVAULT_UPDATE.registration || await navigator.serviceWorker.ready;
        window.FIREVAULT_UPDATE.registration = reg;
        await reg.update();
        const response = await fetch("version.json?t=" + Date.now(), {cache:"no-store"});
        const remote = response.ok ? await response.json() : {};
        const newer = remote.build && remote.build !== window.FIREVAULT_BUILD;
        if (reg.waiting) window.fireVaultShowUpdate(reg.waiting, remote.build || "new version");
        else if (newer && options.reloadWhenNew) location.reload();
        return {supported:true,newer:newer,remote:remote.build||window.FIREVAULT_BUILD};
      } finally { window.FIREVAULT_UPDATE.checking = false; }
    };
    window.fireVaultShowUpdate = function(worker, build){
      window.FIREVAULT_UPDATE.waiting = worker;
      if (document.getElementById("fvUpdateBanner072")) return;
      const banner=document.createElement("div");
      banner.id="fvUpdateBanner072";
      banner.innerHTML='<div><strong>FireVault update ready</strong><span>Build '+build+' is available.</span></div><button id="fvUpdateNow072">Update Now</button><button id="fvUpdateLater072" aria-label="Dismiss">×</button>';
      document.body.appendChild(banner);
      document.getElementById("fvUpdateNow072").onclick=function(){ worker.postMessage({type:"SKIP_WAITING"}); };
      document.getElementById("fvUpdateLater072").onclick=function(){ banner.remove(); };
    };
    window.fireVaultClearAppCache = async function(){
      if ("caches" in window) { const names=await caches.keys(); await Promise.all(names.map(n=>caches.delete(n))); }
      if ("serviceWorker" in navigator) { const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.update())); }
      return true;
    };
    window.fireVaultLockPortrait0723 = async function(){
      try {
        if (screen.orientation && typeof screen.orientation.lock === "function") {
          await screen.orientation.lock("portrait-primary");
          return true;
        }
      } catch(e) {}
      return false;
    };
    ["pageshow","focus"].forEach(function(name){ window.addEventListener(name,function(){ window.fireVaultLockPortrait0723(); }); });
    document.addEventListener("visibilitychange",function(){ if(!document.hidden) window.fireVaultLockPortrait0723(); });
    document.addEventListener("pointerdown",function portraitFirstGesture0723(){ window.fireVaultLockPortrait0723(); document.removeEventListener("pointerdown",portraitFirstGesture0723); },{once:true});
    window.fireVaultLockPortrait0723();
    if ("serviceWorker" in navigator) {
      let refreshing=false;
      navigator.serviceWorker.addEventListener("controllerchange", function(){
        if (refreshing) return; refreshing=true; location.reload();
      });
      window.addEventListener("load", async function(){
        try {
          await window.fireVaultLockPortrait0723();
          const reg=await navigator.serviceWorker.register("sw.js?v=0.78.3", {scope:"./", updateViaCache:"none"});
          window.FIREVAULT_UPDATE.registration=reg;
          if (reg.waiting) window.fireVaultShowUpdate(reg.waiting,"0.78.3");
          reg.addEventListener("updatefound", function(){
            const worker=reg.installing; if(!worker)return;
            worker.addEventListener("statechange", function(){
              if(worker.state==="installed" && navigator.serviceWorker.controller) window.fireVaultShowUpdate(worker,"latest");
            });
          });
          try {
            const updateResult=await window.fireVaultCheckForUpdates({reloadWhenNew:false});
            window.fireVaultSplashVersionReady0732(updateResult && updateResult.newer ? "UPDATE READY" : "CURRENT");
          } catch(updateError) {
            window.fireVaultSplashVersionReady0732("OFFLINE READY");
          }
        } catch(e) { window.fireVaultSplashVersionReady0732("OFFLINE READY"); }
      });
    } else {
      window.addEventListener("load",function(){ window.fireVaultSplashVersionReady0732("BROWSER MODE"); });
    }
  </script>
  <script type="module" src="src/app.js?v=0.78.3"></script>
