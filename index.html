<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101216" />
  <title>FireVault</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#0b0d10; --panel:#151922; --panel2:#1d2330; --line:#303747;
      --text:#f4f7fb; --muted:#a7b0c0; --red:#ef4444; --amber:#f59e0b;
      --green:#22c55e; --blue:#38bdf8; --purple:#a78bfa; --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;background:radial-gradient(circle at top left,rgba(239,68,68,.17),transparent 35%),linear-gradient(180deg,#11151d,#090b0f);
      color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      overflow:hidden;
    }
    header{height:62px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(11,13,16,.92);border-bottom:1px solid rgba(255,255,255,.07);backdrop-filter:blur(16px)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:950;letter-spacing:.08em}
    .logo{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(135deg,#ef4444,#7f1d1d)}
    .build{font-size:12px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:7px 10px}
    main{height:calc(100vh - 134px);padding:12px;overflow:hidden;max-width:900px;margin:0 auto}
    h1{font-size:23px;margin:0 0 4px;line-height:1.1}
    h2{font-size:17px;margin:0 0 8px}
    h3{font-size:14px;margin:0 0 5px}
    p{color:var(--muted);margin:4px 0;line-height:1.25;font-size:14px}
    .screen{height:100%;display:flex;flex-direction:column;gap:10px}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:12px}
    .tight{padding:10px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .wrap{flex-wrap:wrap}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .grow{flex:1;min-height:0}
    .list{overflow:auto;min-height:0;padding-right:2px}
    button,.btn{border:1px solid rgba(255,255,255,.09);border-radius:15px;background:var(--panel2);color:var(--text);padding:11px 12px;font-weight:850;cursor:pointer;font-size:14px;text-decoration:none}
    .primary{background:linear-gradient(135deg,#ef4444,#991b1b)}
    .ghost{background:rgba(255,255,255,.045)}
    .danger{background:rgba(239,68,68,.14);color:#fecaca}
    .tile{min-height:72px;text-align:left;display:flex;flex-direction:column;justify-content:center}
    .tile strong{font-size:17px}
    .tile span{color:var(--muted);font-size:12px;margin-top:3px}
    input,textarea,select{width:100%;background:#0d1118;border:1px solid var(--line);border-radius:13px;padding:10px;color:var(--text);font:inherit}
    textarea{min-height:72px;resize:none}
    label{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.08em}
    .form{display:grid;gap:8px;overflow:auto;min-height:0}
    .pill{font-size:12px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.065);border-radius:999px;padding:5px 8px;display:inline-flex;margin:2px}
    .muted{color:var(--muted)}
    .empty{border:1px dashed var(--line);border-radius:16px;padding:16px;text-align:center;color:var(--muted)}
    .siteItem{cursor:pointer}
    .search{margin-bottom:8px}
    .back{padding:8px 10px;border-radius:12px}
    nav{height:72px;position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);background:rgba(11,13,16,.96);border-top:1px solid rgba(255,255,255,.08);padding:7px 8px calc(7px + env(safe-area-inset-bottom))}
    nav button{background:transparent;border:0;color:var(--muted);display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;padding:6px 3px;font-size:12px}
    nav button.active{background:rgba(239,68,68,.14);color:#fff}
    .issue{border-left:4px solid var(--amber)}
    .visit{border-left:4px solid var(--blue)}
    .equip{border-left:4px solid var(--green)}
    .accessLine{border-left:4px solid var(--purple)}
    .redline{border-left:4px solid var(--red)}
  </style>
</head>
<body>
<header>
  <div class="brand"><div class="logo">🔥</div><div>FIREVAULT</div></div>
  <button class="build" onclick="showChangelog()">Build 0.6.0</button>
</header>
<main id="app"></main>
<nav>
  <button id="nav-home" onclick="go('home')"><span>🏠</span><span>Today</span></button>
  <button id="nav-sites" onclick="go('sites')"><span>🏢</span><span>Sites</span></button>
  <button id="nav-library" onclick="go('library')"><span>📚</span><span>Library</span></button>
  <button id="nav-settings" onclick="go('settings')"><span>⚙️</span><span>Settings</span></button>
</nav>

<script>
const BUILD="0.6.0";
const KEY="firevault_vault_build_030";
let data=load();
let view="home", selected=null, mode=null;

function load(){
  const raw=localStorage.getItem(KEY);
  if(raw){try{return JSON.parse(raw)}catch(e){}}
  return {sites:[], resources:[
    {m:"Fire-Lite",n:"Manual links, trouble notes, walk-test reminders."},
    {m:"Notifier",n:"Panel notes, programming reminders, common issues."},
    {m:"Silent Knight",n:"Model notes, NAC quirks, communicator references."},
    {m:"Edwards / EST",n:"EST3 / EST4 notes, mapping, node information."},
    {m:"Potter",n:"Programming notes, compatibility, field observations."}
  ]};
}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function app(html){document.getElementById("app").innerHTML=html; active()}
function active(){document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active")); let n=document.getElementById("nav-"+(view==="site"||view==="form"||view==="visits"||view==="issues"||view==="equipment"||view==="equipmentForm"||view==="access"||view==="accessForm"?"sites":view)); if(n)n.classList.add("active")}
function go(v){view=v; mode=null; render()}
function site(){return data.sites.find(s=>s.id===selected)}
function ensureArrays(s){if(!s)return s;s.visits=s.visits||[];s.knownIssues=s.knownIssues||[];s.equipment=s.equipment||[];s.contacts=s.contacts||[];return s}
function render(){({home,sites,library,settings,site:siteDash,form,visits,issues,equipment,equipmentForm,access,accessForm}[view]||home)()}

function home(){
 const visits=data.sites.flatMap(s=>(s.visits||[]).map(v=>({...v,site:s.name}))).sort((a,b)=>b.date.localeCompare(a.date));
 const issueCount=data.sites.reduce((a,s)=>a+(s.knownIssues||[]).length,0);
 const equipCount=data.sites.reduce((a,s)=>a+(s.equipment||[]).length,0);
 app(`<div class="screen">
  <div><h1>Today</h1><p>Fast access for field calls. No-scroll dashboard.</p></div>
  <div class="grid3">
    <div class="card tile"><strong>${data.sites.length}</strong><span>Sites</span></div>
    <div class="card tile"><strong>${issueCount}</strong><span>Issues</span></div>
    <div class="card tile"><strong>${equipCount}</strong><span>Equipment</span></div>
  </div>
  <div class="grid2">
    <button class="primary tile" onclick="newSite()"><strong>＋ Add Site</strong><span>Create customer vault</span></button>
    <button class="ghost tile" onclick="go('sites')"><strong>Search Sites</strong><span>Find customer info</span></button>
  </div>
  <div class="card grow">
    <div class="row"><h2>Recent Visits</h2><button class="ghost" onclick="go('sites')">Open Sites</button></div>
    <div class="list">
      ${visits.length?visits.slice(0,4).map(v=>`<div class="card tight visit"><strong>${esc(v.site)}</strong><p>${esc(v.summary)}</p><span class="pill">${esc(v.date)}</span></div>`).join(""):`<div class="empty">No visits yet.</div>`}
    </div>
  </div>
 </div>`)
}

function sites(){
 app(`<div class="screen">
  <div class="row"><div><h1>Sites</h1><p>Customer vaults sorted for quick access.</p></div><button class="primary" onclick="newSite()">＋ Add</button></div>
  <input class="search" id="q" placeholder="Search site, panel, contact, access, issue..." oninput="filter()">
  <div id="siteList" class="list grow">${siteList(data.sites)}</div>
 </div>`)
}
function siteList(list){
 if(!list.length)return `<div class="empty">No sites yet. Tap Add.</div>`;
 return list.map(s=>{ensureArrays(s);return `<div class="card siteItem" onclick="openSite('${s.id}')">
  <div class="row"><h2>${esc(s.name)}</h2><span class="pill">${esc(s.panelManufacturer||"Panel TBD")}</span></div>
  <p>${esc(s.address||"No address")}</p>
  <span class="pill">${esc(s.panelModel||"Model TBD")}</span><span class="pill">Visits ${s.visits.length}</span><span class="pill">Issues ${s.knownIssues.length}</span><span class="pill">Contacts ${s.contacts.length}</span>
 </div>`}).join("")
}
function filter(){let q=document.getElementById("q").value.toLowerCase();document.getElementById("siteList").innerHTML=siteList(data.sites.filter(s=>JSON.stringify(s).toLowerCase().includes(q)))}
function newSite(){selected=null;view="form";render()}
function openSite(id){selected=id;ensureArrays(site());view="site";render()}

function siteDash(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="go('sites')">←</button><button class="ghost" onclick="editSite()">Edit</button></div>
  <div class="card redline">
    <h1>${esc(s.name)}</h1>
    <p>${esc(s.address||"No address entered")}</p>
    <span class="pill">🔥 ${esc(s.panelManufacturer||"Manufacturer TBD")}</span>
    <span class="pill">${esc(s.panelModel||"Model TBD")}</span>
  </div>
  <div class="grid2">
    <button class="tile" onclick="view='visits';render()"><strong>Visits</strong><span>${s.visits.length} records</span></button>
    <button class="tile" onclick="view='issues';render()"><strong>Known Issues</strong><span>${s.knownIssues.length} items</span></button>
    <button class="tile" onclick="view='equipment';render()"><strong>Equipment</strong><span>${s.equipment.length} records</span></button>
    <button class="tile" onclick="view='access';render()"><strong>Access</strong><span>${s.contacts.length} contacts</span></button>
  </div>
  <div class="card grow">
    <h2>Site Snapshot</h2>
    <p><strong>FACP:</strong> ${esc(s.facpLocation||"Not entered")}</p>
    <p><strong>Monitoring:</strong> ${esc(s.monitoring||"Not entered")}</p>
    <p><strong>Primary Contact:</strong> ${esc(primaryContact(s))}</p>
  </div>
 </div>`)
}
function primaryContact(s){return (s.contacts&&s.contacts[0]) ? `${s.contacts[0].name||"Unnamed"} ${s.contacts[0].phone||""}`.trim() : "Not entered"}
function editSite(){view="form";render()}

function form(){
 const s=selected?site():{};
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="${selected?"view='site';render()":"go('sites')"}">←</button><h1>${selected?"Edit Site":"Add Site"}</h1></div>
  <div class="form grow">
    <div><label>Site Name</label><input id="name" value="${esc(s.name)}" placeholder="ABC Apartments"></div>
    <div><label>Address</label><input id="address" value="${esc(s.address)}" placeholder="123 Main St"></div>
    <div class="grid2"><div><label>Manufacturer</label><input id="panelManufacturer" value="${esc(s.panelManufacturer)}" placeholder="EST"></div><div><label>Model</label><input id="panelModel" value="${esc(s.panelModel)}" placeholder="EST4"></div></div>
    <div><label>FACP Location</label><input id="facpLocation" value="${esc(s.facpLocation)}" placeholder="Electrical room"></div>
    <div><label>Monitoring</label><input id="monitoring" value="${esc(s.monitoring)}" placeholder="Central station / communicator"></div>
    <div><label>Legacy Access Note</label><textarea id="access" placeholder="Old-style access note">${esc(s.access)}</textarea></div>
    <div><label>Notes</label><textarea id="notes" placeholder="Important site notes">${esc(s.notes)}</textarea></div>
  </div>
  <button class="primary" onclick="saveSite()">Save Site</button>
 </div>`)
}
function val(id){return document.getElementById(id).value.trim()}
function saveSite(){
 const obj={name:val("name")||"Unnamed Site",address:val("address"),panelManufacturer:val("panelManufacturer"),panelModel:val("panelModel"),facpLocation:val("facpLocation"),monitoring:val("monitoring"),access:val("access"),notes:val("notes"),updatedAt:new Date().toISOString()};
 if(selected){let i=data.sites.findIndex(x=>x.id===selected);data.sites[i]={...data.sites[i],...obj}}
 else{selected=uid();data.sites.unshift({...obj,id:selected,createdAt:new Date().toISOString(),visits:[],knownIssues:[],equipment:[],contacts:[]})}
 save(); view="site"; render()
}

function visits(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Visits</h1></div>
  <div class="card">
    <div class="grid2"><input id="vdate" type="date" value="${new Date().toISOString().slice(0,10)}"><input id="vtags" placeholder="Tags: NAC, Battery"></div>
    <textarea id="vsum" placeholder="Visit summary"></textarea>
    <button class="primary" onclick="addVisit()">Add Visit</button>
  </div>
  <div class="list grow">${s.visits.length?s.visits.map(v=>`<div class="card visit"><strong>${esc(v.date)}</strong><p>${esc(v.summary)}</p>${(v.tags||[]).map(t=>`<span class="pill">#${esc(t)}</span>`).join("")}</div>`).join(""):`<div class="empty">No visits.</div>`}</div>
 </div>`)
}
function addVisit(){const s=ensureArrays(site());let sum=val("vsum");if(!sum)return alert("Enter a summary.");s.visits.unshift({id:uid(),date:val("vdate"),summary:sum,tags:val("vtags").split(",").map(x=>x.trim()).filter(Boolean)});save();visits()}

function issues(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Known Issues</h1></div>
  <div class="card"><textarea id="itxt" placeholder="Example: NAC 2 ground fault after rain. Check loading dock pull station first."></textarea><button class="primary" onclick="addIssue()">Add Issue</button></div>
  <div class="list grow">${s.knownIssues.length?s.knownIssues.map(i=>`<div class="card issue"><p>${esc(i.text)}</p><span class="pill">${esc(i.created)}</span></div>`).join(""):`<div class="empty">No known issues.</div>`}</div>
 </div>`)
}
function addIssue(){const s=ensureArrays(site());let text=val("itxt");if(!text)return alert("Enter issue.");s.knownIssues.unshift({id:uid(),text,created:new Date().toLocaleDateString()});save();issues()}

function equipment(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 app(`<div class="screen">
   <div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Equipment</h1><button class="primary" onclick="mode=null;view='equipmentForm';render()">＋ Add</button></div>
   <div class="list grow">
    ${s.equipment.length?s.equipment.map(e=>`<div class="card equip">
      <div class="row"><h2>${esc(e.type)}</h2><button class="ghost" onclick="mode='${e.id}';view='equipmentForm';render()">Edit</button></div>
      <p><strong>${esc(e.make||"Make TBD")} ${esc(e.model||"")}</strong></p>
      <span class="pill">${esc(e.location||"Location TBD")}</span>
      <span class="pill">${esc(e.status||"Status unknown")}</span>
      <p>${esc(e.notes||"")}</p>
    </div>`).join(""):`<div class="empty">No equipment yet. Add panels, boosters, annunciators, communicators, batteries, or power supplies.</div>`}
   </div>
 </div>`)
}
function equipmentForm(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 const e=mode?s.equipment.find(x=>x.id===mode):{};
 app(`<div class="screen">
   <div class="row"><button class="back ghost" onclick="view='equipment';render()">←</button><h1>${mode?"Edit Equipment":"Add Equipment"}</h1></div>
   <div class="form grow">
    <div><label>Type</label><select id="etype">
      ${["Main FACP","Booster Panel","Annunciator","Communicator","Power Supply","Battery Set","Smoke Control","Elevator Recall","Network Node","Other"].map(t=>`<option ${e.type===t?"selected":""}>${t}</option>`).join("")}
    </select></div>
    <div class="grid2"><div><label>Manufacturer</label><input id="emake" value="${esc(e.make)}" placeholder="EST, Notifier..."></div><div><label>Model</label><input id="emodel" value="${esc(e.model)}" placeholder="EST4, FCPS..."></div></div>
    <div><label>Location</label><input id="elocation" value="${esc(e.location)}" placeholder="Electrical room, above ceiling..."></div>
    <div><label>Status</label><select id="estatus">
      ${["Active","Needs Attention","Out of Service","Unknown"].map(t=>`<option ${e.status===t?"selected":""}>${t}</option>`).join("")}
    </select></div>
    <div><label>Notes</label><textarea id="enotes" placeholder="Battery dates, circuit info, quirks, wiring notes...">${esc(e.notes)}</textarea></div>
   </div>
   <button class="primary" onclick="saveEquipment()">Save Equipment</button>
 </div>`)
}
function saveEquipment(){
 const s=ensureArrays(site());
 const obj={type:val("etype"),make:val("emake"),model:val("emodel"),location:val("elocation"),status:val("estatus"),notes:val("enotes"),updatedAt:new Date().toISOString()};
 if(mode){let i=s.equipment.findIndex(x=>x.id===mode);s.equipment[i]={...s.equipment[i],...obj}}
 else{s.equipment.unshift({...obj,id:uid(),createdAt:new Date().toISOString()})}
 save(); mode=null; view="equipment"; render()
}

function access(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Access</h1><button class="primary" onclick="mode=null;view='accessForm';render()">＋ Add</button></div>
  <div class="card tight accessLine">
    <h2>Legacy Access Note</h2>
    <p>${esc(s.access||"No legacy access note entered.")}</p>
  </div>
  <div class="list grow">
    ${s.contacts.length?s.contacts.map(c=>`<div class="card accessLine">
      <div class="row"><h2>${esc(c.type)}</h2><button class="ghost" onclick="mode='${c.id}';view='accessForm';render()">Edit</button></div>
      <p><strong>${esc(c.name||"Unnamed")}</strong></p>
      <span class="pill">${esc(c.phone||"No phone")}</span>
      <span class="pill">${esc(c.detail||"No detail")}</span>
      <p>${esc(c.notes||"")}</p>
    </div>`).join(""):`<div class="empty">No structured access/contact records yet. Add manager, maintenance, Knox Box, gate code, key location, or monitoring contact.</div>`}
  </div>
 </div>`)
}
function accessForm(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 const c=mode?s.contacts.find(x=>x.id===mode):{};
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="view='access';render()">←</button><h1>${mode?"Edit Access":"Add Access"}</h1></div>
  <div class="form grow">
    <div><label>Type</label><select id="ctype">
      ${["Site Contact","Maintenance","Property Manager","Monitoring Company","Knox Box","Lockbox","Gate Code","Key Location","After-Hours Contact","Other"].map(t=>`<option ${c.type===t?"selected":""}>${t}</option>`).join("")}
    </select></div>
    <div><label>Name / Label</label><input id="cname" value="${esc(c.name)}" placeholder="Maintenance / Main Office / Knox Box #3"></div>
    <div><label>Phone / Code</label><input id="cphone" value="${esc(c.phone)}" placeholder="Phone number, extension, or code"></div>
    <div><label>Detail</label><input id="cdetail" value="${esc(c.detail)}" placeholder="Front desk, north gate, mechanical room..."></div>
    <div><label>Notes</label><textarea id="cnotes" placeholder="Any special access instructions or warnings">${esc(c.notes)}</textarea></div>
  </div>
  <button class="primary" onclick="saveContact()">Save Access Record</button>
 </div>`)
}
function saveContact(){
 const s=ensureArrays(site());
 const obj={type:val("ctype"),name:val("cname"),phone:val("cphone"),detail:val("cdetail"),notes:val("cnotes"),updatedAt:new Date().toISOString()};
 if(mode){let i=s.contacts.findIndex(x=>x.id===mode);s.contacts[i]={...s.contacts[i],...obj}}
 else{s.contacts.unshift({...obj,id:uid(),createdAt:new Date().toISOString()})}
 save(); mode=null; view="access"; render()
}

function library(){app(`<div class="screen"><h1>Library</h1><p>Manufacturer resources and cheat sheets.</p><div class="list grow">${data.resources.map(r=>`<div class="card"><h2>${esc(r.m)}</h2><p>${esc(r.n)}</p></div>`).join("")}</div></div>`)}
function settings(){app(`<div class="screen"><h1>Settings</h1><div class="card"><h2>Backup</h2><p>Export before major changes.</p><button class="primary" onclick="exportData()">Export Backup</button><br><br><input type="file" accept="application/json" onchange="importData(event)"></div><div class="card"><h2>Reset</h2><button class="danger" onclick="resetData()">Clear Local Data</button></div></div>`)}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="firevault-backup-build-0.6.0.json";a.click()}
function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();alert("Imported.");go("home")}catch(err){alert("Import failed.")}};r.readAsText(f)}
function resetData(){if(confirm("Clear all local FireVault data?")){localStorage.removeItem(KEY);data=load();go("home")}}
function showChangelog(){alert(`FireVault Build ${BUILD}\n\n- Structured access/contact records\n- Add/Edit contacts, lockboxes, gate codes, key locations\n- Access count on site dashboard and site cards\n- Search includes access/contact records\n- Preserves previous local data`)}
render()
</script>
</body>
</html>
