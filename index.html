<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101216" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="FireVault" />
  <title>FireVault</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=0.46.8" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=0.46.8" />
  <link rel="stylesheet" href="src/styles.css?v=0.46.8" />
</head>
<body>
  <header>
    <div class="brand"><img class="brandMark" src="assets/favicon.png?v=0.46.8" alt=""><div><div>FIREVAULT</div><small>Field Vault System</small></div></div>
    <button class="build" id="buildButton">Build 0.46.8</button>
  </header>

  <main id="app">
    <div class="splashScreen457">
      <div class="splashOrb457">
        <img src="assets/favicon.png?v=0.46.8" alt="FireVault">
      </div>
      <div class="splashText457">
        <h1>FireVault</h1>
        <p>Preparing field vault system</p>
      </div>
      <div class="splashMeter457"><span></span></div>
    </div>
  </main>

  <nav>
    <button id="nav-home" data-route="home"><span>⌂</span><span>Today</span></button>
    <button id="nav-sites" data-route="sites"><span>▦</span><span>Sites</span></button>
    <button id="nav-library" data-route="library"><span>▣</span><span>Library</span></button>
    <button id="nav-settings" data-route="settings"><span>⚙</span><span>Settings</span></button>
  </nav>


  <script>
    window.__FIREVAULT_BOOTED = false;
    window.addEventListener('error', function(e){ window.__FIREVAULT_LAST_ERROR = e.message || String(e.error || e); });
    window.addEventListener('unhandledrejection', function(e){ window.__FIREVAULT_LAST_ERROR = String(e.reason || e); });
    setTimeout(function(){
      var app = document.getElementById('app');
      if (!window.__FIREVAULT_BOOTED && app && /Loading FireVault/i.test(app.textContent || '')) {
        app.innerHTML = '<div class="screen"><div class="card errorBox"><h1>FireVault did not finish loading</h1><p>The app module did not boot. Hard refresh the browser or redeploy the latest build files.</p><p>' + (window.__FIREVAULT_LAST_ERROR || 'No browser error was reported.') + '</p></div></div>';
      }
    }, 3500);
  </script>
  <script type="module" src="src/app.js?v=0.46.8"></script>
</body>
</html>
