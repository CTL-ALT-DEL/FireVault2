<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101216" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FireVault" />
  <title>FireVault</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=0.41.2" />
  <link rel="icon" type="image/png" href="assets/favicon.png?v=0.41.2" />
  <link rel="stylesheet" href="src/styles.css?v=0.41.2" />
</head>
<body>
  <header>
    <div class="brand"><img class="brandMark" src="assets/favicon.png?v=0.41.2" alt=""><div><div>FIREVAULT</div><small>Field Vault System</small></div></div>
    <button class="build" id="buildButton">Build 0.41.2</button>
  </header>

  <main id="app">
    <div class="screen"><div class="card"><h1>Loading FireVault...</h1></div></div>
  </main>

  <nav>
    <button id="nav-home" data-route="home"><span>⌂</span><span>Today</span></button>
    <button id="nav-sites" data-route="sites"><span>▦</span><span>Sites</span></button>
    <button id="nav-library" data-route="library"><span>▣</span><span>Library</span></button>
    <button id="nav-settings" data-route="settings"><span>⚙</span><span>Settings</span></button>
  </nav>

  <script>
    (function(){
      function escapeHtml(value){
        return String(value || "").replace(/[&<>"']/g, function(m){ return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[m] || m; });
      }
      window.__firevaultBooted = false;
      window.__firevaultBootError = function(err){
        window.__firevaultBooted = true;
        var app = document.getElementById("app");
        if(!app) return;
        var msg = err && (err.stack || err.message || err) || "Unknown startup error";
        app.innerHTML = '<div class="screen"><div class="card errorBox"><h1>FireVault Startup Diagnostics</h1><p>The app script did not finish loading. This usually means one of the app files was not copied, the browser is using an old cached file, or the project was deployed from the wrong folder.</p><p class="monoText">'+escapeHtml(msg)+'</p><button class="primary" onclick="location.reload()">Reload</button></div></div>';
      };
      setTimeout(function(){
        var app = document.getElementById("app");
        if(!window.__firevaultBooted && app && /Loading FireVault/.test(app.innerText || "")){
          window.__firevaultBootError("Build 0.41.2 boot watchdog: app.js did not report ready after 3.5 seconds. Check that /src/app.js and /src/storage.js were deployed with index.html.");
        }
      }, 3500);
    })();
  </script>
  <script type="module">
    import("./src/app.js?v=0.41.2").catch(function(err){ window.__firevaultBootError(err); });
  </script>
</body>
</html>
