<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#101216" />
<title>FireVault</title>
<link rel="manifest" href="manifest.json" />
<style>
:root{--bg:#0b0d10;--panel:#151922;--panel2:#1d2330;--line:#303747;--text:#f4f7fb;--muted:#a7b0c0;--red:#ef4444;--amber:#f59e0b;--green:#22c55e;--blue:#38bdf8;--purple:#a78bfa;--cyan:#22d3ee;--radius:18px;--headerH:62px;--navH:calc(72px + env(safe-area-inset-bottom))}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:radial-gradient(circle at top left,rgba(239,68,68,.17),transparent 35%),linear-gradient(180deg,#11151d,#090b0f);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
header{height:var(--headerH);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(11,13,16,.92);border-bottom:1px solid rgba(255,255,255,.07);backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:950;letter-spacing:.08em}.logo{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(135deg,#ef4444,#7f1d1d)}
.build{font-size:12px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:7px 10px}
main{height:calc(100dvh - var(--headerH) - var(--navH));padding:12px 12px 18px;overflow:hidden;max-width:900px;margin:0 auto}
h1{font-size:23px;margin:0 0 4px;line-height:1.1}h2{font-size:17px;margin:0 0 8px}p{color:var(--muted);margin:4px 0;line-height:1.25;font-size:14px}
.screen{height:100%;display:flex;flex-direction:column;gap:10px}.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:12px}.tight{padding:10px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.grow{flex:1;min-height:0}.list{overflow:auto;min-height:0;padding-right:2px;padding-bottom:18px}
button,.btn{border:1px solid rgba(255,255,255,.09);border-radius:15px;background:var(--panel2);color:var(--text);padding:11px 12px;font-weight:850;cursor:pointer;font-size:14px;text-decoration:none}
.primary{background:linear-gradient(135deg,#ef4444,#991b1b)}.ghost{background:rgba(255,255,255,.045)}.danger{background:rgba(239,68,68,.14);color:#fecaca}.success{background:rgba(34,197,94,.18);color:#bbf7d0}
.tile{min-height:72px;text-align:left;display:flex;flex-direction:column;justify-content:center}.tile strong{font-size:17px}.tile span{color:var(--muted);font-size:12px;margin-top:3px}
input,textarea,select{width:100%;background:#0d1118;border:1px solid var(--line);border-radius:13px;padding:10px;color:var(--text);font:inherit}textarea{min-height:72px;resize:none}
label{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.08em}.form{display:grid;gap:8px;overflow:auto;min-height:0;padding-bottom:18px}
.pill{font-size:12px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.065);border-radius:999px;padding:5px 8px;display:inline-flex;margin:2px}.muted{color:var(--muted)}
.empty{border:1px dashed var(--line);border-radius:16px;padding:16px;text-align:center;color:var(--muted)}.siteItem{cursor:pointer}.search{margin-bottom:8px}.back{padding:8px 10px;border-radius:12px}
nav{min-height:var(--navH);position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);background:rgba(11,13,16,.96);border-top:1px solid rgba(255,255,255,.08);padding:7px 8px calc(7px + env(safe-area-inset-bottom));z-index:50}
nav button{background:transparent;border:0;color:var(--muted);display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;padding:6px 3px;font-size:12px}nav button.active{background:rgba(239,68,68,.14);color:#fff}
.issue{border-left:4px solid var(--amber)}.visit{border-left:4px solid var(--blue)}.equip{border-left:4px solid var(--green)}.accessLine{border-left:4px solid var(--purple)}.docLine{border-left:4px solid var(--cyan)}.redline{border-left:4px solid var(--red)}
.jobBanner{background:linear-gradient(135deg,rgba(239,68,68,.25),rgba(56,189,248,.12));border-color:rgba(239,68,68,.35)}
.quick{min-height:58px;text-align:center}.timer{font-size:31px;font-weight:950;letter-spacing:.03em}.eventTime{font-weight:900;color:#fff;margin-right:8px}
</style>
</head>
<body>
<header><div class="brand"><div class="logo">🔥</div><div>FIREVAULT</div></div><button class="build" onclick="showChangelog()">Build 0.9.0</button></header>
<main id="app"></main>
<nav>
<button id="nav-home" onclick="go('home')"><span>🏠</span><span>Today</span></button>
<button id="nav-sites" onclick="go('sites')"><span>🏢</span><span>Sites</span></button>
<button id="nav-library" onclick="go('library')"><span>📚</span><span>Library</span></button>
<button id="nav-settings" onclick="go('settings')"><span>⚙️</span><span>Settings</span></button>
</nav>
<script>
const BUILD="0.9.0"; const KEY="firevault_vault_build_030"; const ACTIVE="firevault_active_job_080";
let data=load(), activeJob=loadActive(), view="home", selected=null, mode=null, timer=null;
function load(){const raw=localStorage.getItem(KEY);if(raw){try{return JSON.parse(raw)}catch(e){}}return{sites:[],resources:[{m:"Fire-Lite",n:"Manual links, trouble notes, walk-test reminders."},{m:"Notifier",n:"Panel notes, programming reminders, common issues."},{m:"Silent Knight",n:"Model notes, NAC quirks, communicator references."},{m:"Edwards / EST",n:"EST3 / EST4 notes, mapping, node information."},{m:"Potter",n:"Programming notes, compatibility, field observations."}]}}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}function loadActive(){const raw=localStorage.getItem(ACTIVE);if(raw){try{return JSON.parse(raw)}catch(e){}}return null}function saveActive(){activeJob?localStorage.setItem(ACTIVE,JSON.stringify(activeJob)):localStorage.removeItem(ACTIVE)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function app(html){document.getElementById("app").innerHTML=html;active();if(view==="job")startTick();else stopTick()}function active(){document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));let n=document.getElementById("nav-"+(["site","form","visits","issues","equipment","equipmentForm","access","accessForm","docs","docForm","job"].includes(view)?"sites":view));if(n)n.classList.add("active")}
function go(v){view=v;mode=null;render()}function site(){return data.sites.find(s=>s.id===selected)}function siteById(id){return data.sites.find(s=>s.id===id)}
function ensureArrays(s){if(!s)return s;s.visits=s.visits||[];s.knownIssues=s.knownIssues||[];s.equipment=s.equipment||[];s.contacts=s.contacts||[];s.docs=s.docs||[];return s}
function render(){({home,sites,library,settings,site:siteDash,form,visits,issues,equipment,equipmentForm,access,accessForm,docs,docForm,job}[view]||home)()}function val(id){return document.getElementById(id).value.trim()}
function getLocation(cb){
 if(!navigator.geolocation){alert("GPS is not available in this browser.");return}
 navigator.geolocation.getCurrentPosition(pos=>cb(pos.coords.latitude,pos.coords.longitude),err=>alert("GPS permission/location failed: "+err.message),{enableHighAccuracy:true,timeout:12000,maximumAge:30000})
}
function distanceFeet(a,b,c,d){
 if(!a||!b||!c||!d)return null;
 const R=6371000, toRad=x=>x*Math.PI/180;
 const dLat=toRad(c-a), dLon=toRad(d-b);
 const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;
 return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*3.28084);
}
function findNearby(lat,lng){
 return data.sites.map(s=>({s,ft:distanceFeet(lat,lng,Number(s.lat),Number(s.lng))})).filter(x=>x.ft!==null).sort((a,b)=>a.ft-b.ft);
}
function fmtTime(iso){return new Date(iso).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}function elapsed(start){let ms=Date.now()-new Date(start).getTime();let h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return h?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`}
function startTick(){stopTick();timer=setInterval(()=>{let e=document.getElementById("elapsed");if(e&&activeJob)e.textContent=elapsed(activeJob.startedAt)},1000)}function stopTick(){if(timer){clearInterval(timer);timer=null}}

function home(){const visits=data.sites.flatMap(s=>(s.visits||[]).map(v=>({...v,site:s.name}))).sort((a,b)=>(b.date||"").localeCompare(a.date||""));const issueCount=data.sites.reduce((a,s)=>a+(s.knownIssues||[]).length,0);let jobHtml=activeJob?`<div class="card jobBanner"><div class="row"><div><h2>Service Call Active</h2><p>${esc(activeJob.siteName)} • <span id="elapsed">${elapsed(activeJob.startedAt)}</span></p></div><button class="primary" onclick="selected='${activeJob.siteId}';view='job';render()">Open</button></div></div>`:"";
app(`<div class="screen"><div><h1>Today</h1><p>Fast service-call workflow for fire alarm technicians.</p></div>${jobHtml}<div class="grid3"><div class="card tile"><strong>${data.sites.length}</strong><span>Sites</span></div><div class="card tile"><strong>${issueCount}</strong><span>Issues</span></div><div class="card tile"><strong>${visits.length}</strong><span>Visits</span></div></div><div class="grid2"><button class="primary tile" onclick="checkNearby()"><strong>📍 Nearby Site</strong><span>Use GPS to match location</span></button><button class="ghost tile" onclick="newSite()"><strong>＋ Add Site</strong><span>Create customer vault</span></button></div><div id="nearbyBox"></div><div class="card grow"><div class="row"><h2>Recent Visits</h2><button class="ghost" onclick="go('sites')">Open Sites</button></div><div class="list">${visits.length?visits.slice(0,4).map(v=>`<div class="card tight visit"><strong>${esc(v.site)}</strong><p>${esc(v.summary)}</p><span class="pill">${esc(v.date)}</span></div>`).join(""):`<div class="empty">No visits yet.</div>`}</div></div></div>`)}
function checkNearby(){
 const box=document.getElementById("nearbyBox");
 if(box)box.innerHTML='<div class="card">Checking GPS...</div>';
 getLocation((lat,lng)=>{
   const near=findNearby(lat,lng).slice(0,3);
   if(!box)return;
   if(!near.length){box.innerHTML='<div class="card"><h2>No GPS site match</h2><p>Add GPS coordinates to customer sites using Edit Site → Use Current GPS.</p></div>';return}
   box.innerHTML=`<div class="card jobBanner"><h2>Nearby Sites</h2>${near.map(x=>`<div class="card tight siteItem" onclick="openSite('${x.s.id}')"><strong>${esc(x.s.name)}</strong><p>${x.ft} ft away</p></div>`).join("")}</div>`;
 })
}
function sites(){app(`<div class="screen"><div class="row"><div><h1>Sites</h1><p>Open a customer vault or start a service call.</p></div><button class="primary" onclick="newSite()">＋ Add</button></div><input class="search" id="q" placeholder="Search site, panel, doc, contact, issue..." oninput="filter()"><div id="siteList" class="list grow">${siteList(data.sites)}</div></div>`)}
function siteList(list){if(!list.length)return `<div class="empty">No sites yet. Tap Add.</div>`;return list.map(s=>{ensureArrays(s);return `<div class="card siteItem" onclick="openSite('${s.id}')"><div class="row"><h2>${esc(s.name)}</h2><span class="pill">${esc(s.panelManufacturer||"Panel TBD")}</span></div><p>${esc(s.address||"No address")}</p><span class="pill">${esc(s.panelModel||"Model TBD")}</span><span class="pill">Visits ${s.visits.length}</span><span class="pill">Issues ${s.knownIssues.length}</span><span class="pill">Docs ${s.docs.length}</span></div>`}).join("")}
function filter(){let q=val("q").toLowerCase();document.getElementById("siteList").innerHTML=siteList(data.sites.filter(s=>JSON.stringify(s).toLowerCase().includes(q)))}function newSite(){selected=null;view="form";render()}function openSite(id){selected=id;ensureArrays(site());view="site";render()}

function siteDash(){const s=ensureArrays(site());if(!s)return go("sites");let isActive=activeJob&&activeJob.siteId===s.id;app(`<div class="screen"><div class="row"><button class="back ghost" onclick="go('sites')">←</button><button class="ghost" onclick="editSite()">Edit</button></div><div class="card redline"><h1>${esc(s.name)}</h1><p>${esc(s.address||"No address entered")}</p><span class="pill">🔥 ${esc(s.panelManufacturer||"Manufacturer TBD")}</span><span class="pill">${esc(s.panelModel||"Model TBD")}</span></div><button class="${isActive?'success':'primary'} tile" onclick="${isActive?"view='job';render()":"startJob()"}"><strong>${isActive?'OPEN ACTIVE CALL':'▶ START SERVICE CALL'}</strong><span>${isActive?'Timer is running':'Create live timeline and arrival timestamp'}</span></button><div class="grid2"><button class="tile" onclick="view='visits';render()"><strong>Visits</strong><span>${s.visits.length} records</span></button><button class="tile" onclick="view='issues';render()"><strong>Known Issues</strong><span>${s.knownIssues.length} items</span></button><button class="tile" onclick="view='equipment';render()"><strong>Equipment</strong><span>${s.equipment.length} records</span></button><button class="tile" onclick="view='docs';render()"><strong>Docs / Photos</strong><span>${s.docs.length} records</span></button></div><div class="card grow"><h2>Site Snapshot</h2><p><strong>FACP:</strong> ${esc(s.facpLocation||"Not entered")}</p><p><strong>Monitoring:</strong> ${esc(s.monitoring||"Not entered")}</p><p><strong>GPS:</strong> ${s.lat&&s.lng?esc(s.lat+", "+s.lng):"Not set"}</p><p><strong>Known Issues:</strong> ${s.knownIssues.length?s.knownIssues.slice(0,2).map(i=>i.text).join(" / "):"None"}</p></div></div>`)}
function startJob(){const s=ensureArrays(site());if(activeJob&&!confirm("Another service call is active. Replace it?"))return;
 const begin=(lat,lng)=>{activeJob={id:uid(),siteId:s.id,siteName:s.name,startedAt:new Date().toISOString(),lat:lat||"",lng:lng||"",events:[{id:uid(),time:new Date().toISOString(),type:"Arrived",text:lat?`Service call started at GPS ${lat.toFixed(5)}, ${lng.toFixed(5)}`:"Service call started"}]};saveActive();view="job";render()}
 if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>begin(pos.coords.latitude,pos.coords.longitude),()=>begin(null,null),{enableHighAccuracy:true,timeout:8000,maximumAge:30000})}else begin(null,null)
}
function job(){const s=ensureArrays(siteById(activeJob?activeJob.siteId:selected));if(!activeJob||!s){activeJob=null;saveActive();return go("sites")}selected=s.id;app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Job Mode</h1></div><div class="card jobBanner"><h1>${esc(s.name)}</h1><p>SERVICE CALL ACTIVE</p><div class="grid3"><div><span class="muted">Started</span><div><strong>${fmtTime(activeJob.startedAt)}</strong></div></div><div><span class="muted">Elapsed</span><div class="timer" id="elapsed">${elapsed(activeJob.startedAt)}</div></div><div><span class="muted">GPS</span><div><strong>${activeJob.lat?'Saved':'Manual'}</strong></div></div></div></div><div class="grid3"><button class="quick" onclick="quick('⚠ Ground Fault')">⚠<br>Ground</button><button class="quick" onclick="quick('🚨 NAC Trouble')">🚨<br>NAC</button><button class="quick" onclick="quick('🔋 Battery')">🔋<br>Battery</button><button class="quick" onclick="quick('💨 Smoke Detector')">💨<br>Smoke</button><button class="quick" onclick="quick('🚪 Pull Station')">🚪<br>Pull</button><button class="quick" onclick="quick('📡 Communicator')">📡<br>Comm</button><button class="quick" onclick="customNote()">📝<br>Note</button><button class="quick" onclick="quick('📷 Photo Needed')">📷<br>Photo</button><button class="quick" onclick="quick('✅ Test Passed')">✅<br>Passed</button></div><div class="card grow"><div class="row"><h2>Live Timeline</h2><button class="danger" onclick="finishJob()">Finish</button></div><div class="list">${activeJob.events.map(e=>`<div class="card tight visit"><span class="eventTime">${fmtTime(e.time)}</span><strong>${esc(e.type)}</strong><p>${esc(e.text)}</p></div>`).join("")}</div></div></div>`)}
function quick(label){activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:label,text:label});saveActive();job()}
function customNote(){let t=prompt("Enter service note:");if(!t)return;activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:"Note",text:t});saveActive();job()}
function finishJob(){const s=ensureArrays(siteById(activeJob.siteId));let end=new Date().toISOString();activeJob.events.unshift({id:uid(),time:end,type:"Departed",text:"Service call finished"});let summary=activeJob.events.slice().reverse().map(e=>`${fmtTime(e.time)} - ${e.text}`).join("\\n");s.visits.unshift({id:activeJob.id,date:new Date(activeJob.startedAt).toISOString().slice(0,10),summary:`Service call: ${elapsed(activeJob.startedAt)} on site\\n${summary}`,tags:["Service Call"],startedAt:activeJob.startedAt,endedAt:end,events:activeJob.events});save();activeJob=null;saveActive();alert("Service call saved to visit history.");view="visits";render()}

function editSite(){view="form";render()}function form(){const s=selected?site():{};app(`<div class="screen"><div class="row"><button class="back ghost" onclick="${selected?"view='site';render()":"go('sites')"}">←</button><h1>${selected?"Edit Site":"Add Site"}</h1></div><div class="form grow"><div><label>Site Name</label><input id="name" value="${esc(s.name)}" placeholder="ABC Apartments"></div><div><label>Address</label><input id="address" value="${esc(s.address)}"></div><div class="grid2"><div><label>Manufacturer</label><input id="panelManufacturer" value="${esc(s.panelManufacturer)}"></div><div><label>Model</label><input id="panelModel" value="${esc(s.panelModel)}"></div></div><div><label>FACP Location</label><input id="facpLocation" value="${esc(s.facpLocation)}"></div><div><label>Monitoring</label><input id="monitoring" value="${esc(s.monitoring)}"></div><div class="grid2"><div><label>Latitude</label><input id="lat" value="${esc(s.lat)}" placeholder="GPS lat"></div><div><label>Longitude</label><input id="lng" value="${esc(s.lng)}" placeholder="GPS lng"></div></div><button class="ghost" onclick="useCurrentGps()">📍 Use Current GPS For Site</button><div><label>Legacy Access Note</label><textarea id="access">${esc(s.access)}</textarea></div><div><label>Notes</label><textarea id="notes">${esc(s.notes)}</textarea></div></div><button class="primary" onclick="saveSite()">Save Site</button></div>`)}
function useCurrentGps(){getLocation((lat,lng)=>{document.getElementById("lat").value=lat.toFixed(6);document.getElementById("lng").value=lng.toFixed(6);})}
function saveSite(){const obj={name:val("name")||"Unnamed Site",address:val("address"),panelManufacturer:val("panelManufacturer"),panelModel:val("panelModel"),facpLocation:val("facpLocation"),monitoring:val("monitoring"),lat:val("lat"),lng:val("lng"),access:val("access"),notes:val("notes"),updatedAt:new Date().toISOString()};if(selected){let i=data.sites.findIndex(x=>x.id===selected);data.sites[i]={...data.sites[i],...obj}}else{selected=uid();data.sites.unshift({...obj,id:selected,createdAt:new Date().toISOString(),visits:[],knownIssues:[],equipment:[],contacts:[],docs:[]})}save();view="site";render()}

function visits(){const s=ensureArrays(site());if(!s)return go("sites");app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Visits</h1></div><div class="card"><div class="grid2"><input id="vdate" type="date" value="${new Date().toISOString().slice(0,10)}"><input id="vtags" placeholder="Tags: NAC, Battery"></div><textarea id="vsum" placeholder="Visit summary"></textarea><button class="primary" onclick="addVisit()">Add Visit</button></div><div class="list grow">${s.visits.length?s.visits.map(v=>`<div class="card visit"><strong>${esc(v.date)}</strong><p style="white-space:pre-line">${esc(v.summary)}</p>${(v.tags||[]).map(t=>`<span class="pill">#${esc(t)}</span>`).join("")}</div>`).join(""):`<div class="empty">No visits.</div>`}</div></div>`)}
function addVisit(){const s=ensureArrays(site());let sum=val("vsum");if(!sum)return alert("Enter a summary.");s.visits.unshift({id:uid(),date:val("vdate"),summary:sum,tags:val("vtags").split(",").map(x=>x.trim()).filter(Boolean)});save();visits()}
function issues(){const s=ensureArrays(site());if(!s)return go("sites");app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Known Issues</h1></div><div class="card"><textarea id="itxt" placeholder="Known issue"></textarea><button class="primary" onclick="addIssue()">Add Issue</button></div><div class="list grow">${s.knownIssues.length?s.knownIssues.map(i=>`<div class="card issue"><p>${esc(i.text)}</p><span class="pill">${esc(i.created)}</span></div>`).join(""):`<div class="empty">No known issues.</div>`}</div></div>`)}
function addIssue(){const s=ensureArrays(site());let text=val("itxt");if(!text)return alert("Enter issue.");s.knownIssues.unshift({id:uid(),text,created:new Date().toLocaleDateString()});save();issues()}
function equipment(){genericList("Equipment","equipment","equipmentForm","equip",e=>`${esc(e.type)}<p><strong>${esc(e.make||"Make TBD")} ${esc(e.model||"")}</strong></p><span class='pill'>${esc(e.location||"Location TBD")}</span>`)}
function equipmentForm(){const s=ensureArrays(site());const e=mode?s.equipment.find(x=>x.id===mode):{};app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='equipment';render()">←</button><h1>${mode?"Edit Equipment":"Add Equipment"}</h1></div><div class="form grow"><div><label>Type</label><select id="etype">${["Main FACP","Booster Panel","Annunciator","Communicator","Power Supply","Battery Set","Other"].map(t=>`<option ${e.type===t?"selected":""}>${t}</option>`).join("")}</select></div><div class="grid2"><input id="emake" value="${esc(e.make)}" placeholder="Make"><input id="emodel" value="${esc(e.model)}" placeholder="Model"></div><input id="elocation" value="${esc(e.location)}" placeholder="Location"><textarea id="enotes">${esc(e.notes)}</textarea></div><button class="primary" onclick="saveEquipment()">Save Equipment</button></div>`)}
function saveEquipment(){const s=ensureArrays(site());const obj={type:val("etype"),make:val("emake"),model:val("emodel"),location:val("elocation"),notes:val("enotes")};if(mode){let i=s.equipment.findIndex(x=>x.id===mode);s.equipment[i]={...s.equipment[i],...obj}}else{s.equipment.unshift({...obj,id:uid()})}save();mode=null;view="equipment";render()}
function access(){genericList("Access","contacts","accessForm","accessLine",c=>`${esc(c.type)}<p><strong>${esc(c.name||"Unnamed")}</strong></p><span class='pill'>${esc(c.phone||"No phone/code")}</span>`)}
function accessForm(){const s=ensureArrays(site());const c=mode?s.contacts.find(x=>x.id===mode):{};app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='access';render()">←</button><h1>${mode?"Edit Access":"Add Access"}</h1></div><div class="form grow"><select id="ctype">${["Site Contact","Maintenance","Monitoring Company","Knox Box","Lockbox","Gate Code","Key Location","Other"].map(t=>`<option ${c.type===t?"selected":""}>${t}</option>`).join("")}</select><input id="cname" value="${esc(c.name)}" placeholder="Name / Label"><input id="cphone" value="${esc(c.phone)}" placeholder="Phone / Code"><input id="cdetail" value="${esc(c.detail)}" placeholder="Detail"><textarea id="cnotes">${esc(c.notes)}</textarea></div><button class="primary" onclick="saveContact()">Save Access</button></div>`)}
function saveContact(){const s=ensureArrays(site());const obj={type:val("ctype"),name:val("cname"),phone:val("cphone"),detail:val("cdetail"),notes:val("cnotes")};if(mode){let i=s.contacts.findIndex(x=>x.id===mode);s.contacts[i]={...s.contacts[i],...obj}}else{s.contacts.unshift({...obj,id:uid()})}save();mode=null;view="access";render()}
function docs(){genericList("Docs / Photos","docs","docForm","docLine",d=>`${esc(d.title||"Untitled")}<p>${esc(d.type)}</p><span class='pill'>${esc(d.location||"No location")}</span>`)}
function docForm(){const s=ensureArrays(site());const d=mode?s.docs.find(x=>x.id===mode):{};app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='docs';render()">←</button><h1>${mode?"Edit File":"Add File"}</h1></div><div class="form grow"><select id="dtype">${["Panel Photo","Trouble Screenshot","Riser Diagram","Map / Floor Plan","Battery Label","Inspection Report","Manual Link","Cloud File Link","Other"].map(t=>`<option ${d.type===t?"selected":""}>${t}</option>`).join("")}</select><input id="dtitle" value="${esc(d.title)}" placeholder="Title"><input id="dlocation" value="${esc(d.location)}" placeholder="Location"><input id="durl" value="${esc(d.url)}" placeholder="URL / Link"><textarea id="dnotes">${esc(d.notes)}</textarea></div><button class="primary" onclick="saveDoc()">Save File</button></div>`)}
function saveDoc(){const s=ensureArrays(site());const obj={type:val("dtype"),title:val("dtitle"),location:val("dlocation"),url:val("durl"),notes:val("dnotes")};if(mode){let i=s.docs.findIndex(x=>x.id===mode);s.docs[i]={...s.docs[i],...obj}}else{s.docs.unshift({...obj,id:uid()})}save();mode=null;view="docs";render()}
function genericList(title,arr,formView,line,body){const s=ensureArrays(site());if(!s)return go("sites");app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>${title}</h1><button class="primary" onclick="mode=null;view='${formView}';render()">＋ Add</button></div><div class="list grow">${s[arr].length?s[arr].map(x=>`<div class="card ${line}"><div class="row"><h2>${body(x)}</h2><button class="ghost" onclick="mode='${x.id}';view='${formView}';render()">Edit</button></div><p>${esc(x.notes||"")}</p></div>`).join(""):`<div class="empty">No records yet.</div>`}</div></div>`)}
function library(){app(`<div class="screen"><h1>Library</h1><p>Manufacturer resources and cheat sheets.</p><div class="list grow">${data.resources.map(r=>`<div class="card"><h2>${esc(r.m)}</h2><p>${esc(r.n)}</p></div>`).join("")}</div></div>`)}
function settings(){app(`<div class="screen"><h1>Settings</h1><div class="card"><h2>Backup</h2><p>Export before major changes.</p><button class="primary" onclick="exportData()">Export Backup</button><br><br><input type="file" accept="application/json" onchange="importData(event)"></div><div class="card"><h2>Reset</h2><button class="danger" onclick="resetData()">Clear Local Data</button></div></div>`)}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="firevault-backup-build-0.9.0.json";a.click()}
function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();alert("Imported.");go("home")}catch(err){alert("Import failed.")}};r.readAsText(f)}
function resetData(){if(confirm("Clear all local FireVault data?")){localStorage.removeItem(KEY);localStorage.removeItem(ACTIVE);data=load();activeJob=null;go("home")}}
function showChangelog(){alert(`FireVault Build ${BUILD}

- Arrival Intelligence
- Save GPS coordinates to customer sites
- Use Current GPS button on site form
- Nearby Site scan on Today screen
- Service Call records arrival GPS when available
- Preserves previous local data`)}
render()
</script>
</body>
</html>
