<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101216" />
  <title>FireVault</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <header>
    <div class="brand"><div class="logo">🔥</div><div>FIREVAULT</div></div>
    <button class="build" id="buildButton">Build 0.36.0</button>
  </header>

  <main id="app">
    <div class="screen"><div class="card"><h1>Loading FireVault...</h1></div></div>
  </main>

  <nav>
    <button id="nav-home" data-route="home"><span>🏠</span><span>Today</span></button>
    <button id="nav-sites" data-route="sites"><span>🏢</span><span>Sites</span></button>
    <button id="nav-library" data-route="library"><span>📚</span><span>Library</span></button>
    <button id="nav-settings" data-route="settings"><span>⚙️</span><span>Settings</span></button>
  </nav>

  <script type="module" src="src/app.js"></script>
</body>
</html>
