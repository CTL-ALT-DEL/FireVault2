<style>
:root{--bg:#0b0d10;--panel:#151922;--panel2:#1d2330;--line:#303747;--text:#f4f7fb;--muted:#a7b0c0;--red:#ef4444;--amber:#f59e0b;--green:#22c55e;--blue:#38bdf8;--purple:#a78bfa;--cyan:#22d3ee;--radius:18px;--headerH:62px;--navH:calc(72px + env(safe-area-inset-bottom))}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:radial-gradient(circle at top left,rgba(239,68,68,.17),transparent 35%),linear-gradient(180deg,#11151d,#090b0f);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
header{height:var(--headerH);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(11,13,16,.92);border-bottom:1px solid rgba(255,255,255,.07);backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:950;letter-spacing:.08em}.logo{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:linear-gradient(135deg,#ef4444,#7f1d1d)}
.build{font-size:12px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:7px 10px}
main{height:calc(100dvh - var(--headerH) - var(--navH));padding:12px 12px 18px;overflow:hidden;max-width:900px;margin:0 auto}
h1{font-size:23px;margin:0 0 4px;line-height:1.1}h2{font-size:17px;margin:0 0 8px}p{color:var(--muted);margin:4px 0;line-height:1.25;font-size:14px}
.screen{height:100%;display:flex;flex-direction:column;gap:10px}.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:12px}.tight{padding:10px}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.grow{flex:1;min-height:0}.list{overflow:auto;min-height:0;padding-right:2px;padding-bottom:18px}
button,.btn{border:1px solid rgba(255,255,255,.09);border-radius:15px;background:var(--panel2);color:var(--text);padding:11px 12px;font-weight:850;cursor:pointer;font-size:14px;text-decoration:none}
.primary{background:linear-gradient(135deg,#ef4444,#991b1b)}.ghost{background:rgba(255,255,255,.045)}.danger{background:rgba(239,68,68,.14);color:#fecaca}.success{background:rgba(34,197,94,.18);color:#bbf7d0}
.tile{min-height:72px;text-align:left;display:flex;flex-direction:column;justify-content:center}.tile strong{font-size:17px}.tile span{color:var(--muted);font-size:12px;margin-top:3px}
input,textarea,select{width:100%;background:#0d1118;border:1px solid var(--line);border-radius:13px;padding:12px;color:var(--text);font:inherit;min-height:48px;line-height:1.25}
select{appearance:none;-webkit-appearance:none;padding-right:42px}
input[type=file]{font-size:14px;line-height:1.2;min-height:52px;padding:10px;background:#101621}

label{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.08em}.form{display:grid;gap:8px;overflow:auto;min-height:0;padding-bottom:18px}
.pill{font-size:12px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.065);border-radius:999px;padding:5px 8px;display:inline-flex;margin:2px}.muted{color:var(--muted)}
.empty{border:1px dashed var(--line);border-radius:16px;padding:16px;text-align:center;color:var(--muted)}.siteItem{cursor:pointer}.search{margin-bottom:8px}.back{padding:8px 10px;border-radius:12px}
nav{min-height:var(--navH);position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);background:rgba(11,13,16,.96);border-top:1px solid rgba(255,255,255,.08);padding:7px 8px calc(7px + env(safe-area-inset-bottom));z-index:50}
nav button{background:transparent;border:0;color:var(--muted);display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;padding:6px 3px;font-size:12px}nav button.active{background:rgba(239,68,68,.14);color:#fff}
.issue{border-left:4px solid var(--amber)}.visit{border-left:4px solid var(--blue)}.equip{border-left:4px solid var(--green)}.accessLine{border-left:4px solid var(--purple)}.docLine{border-left:4px solid var(--cyan)}.redline{border-left:4px solid var(--red)}
.jobBanner{background:linear-gradient(135deg,rgba(239,68,68,.25),rgba(56,189,248,.12));border-color:rgba(239,68,68,.35)}

<script>
const BUILD="0.27.1"; const KEY="firevault_vault_build_030"; const ACTIVE="firevault_active_job_080";
let data=load(), activeJob=loadActive(), view="home", selected=null, mode=null, timer=null, currentDocImageData="";
function load(){const raw=localStorage.getItem(KEY);if(raw){try{return JSON.parse(raw)}catch(e){}}return{sites:[],resources:[{m:"Fire-Lite",n:"Manual links, trouble notes, walk-test reminders."},{m:"Notifier",n:"Panel notes, programming reminders, common issues."},{m:"Silent Knight",n:"Model notes, NAC quirks, communicator references."},{m:"Edwards / EST",n:"EST3 / EST4 notes, mapping, node information."},{m:"Potter",n:"Programming notes, compatibility, field observations."}]}}
function ensureSettings(){
 data.settings=data.settings||{};
 data.settings.overlay=data.settings.overlay||{fields:["site","date","time"],alignment:"bottom",fontSize:"medium",textColor:"#ffffff",accentColor:"#ef4444",showLogo:true,showTagline:true};
 data.settings.technician=data.settings.technician||{name:"",company:"",phone:"",email:"",license:"",defaultRole:"Fire Alarm Technician"};
 data.settings.notifications=data.settings.notifications||{dailyReminder:false,reminderTime:"07:30",taskAlerts:true,inspectionAlerts:true,gpsPrompts:true};
 data.settings.reports=data.settings.reports||{title:"FireVault Service Report",includeTechnician:true,includePhotos:true,includeMapLink:true,includeDeficiencies:true,includeTasks:true,format:"detailed"};
 data.settings.pdf=data.settings.pdf||{paperSize:"Letter",orientation:"Portrait",photoSize:"Medium",includeLogo:true,footerText:"Generated by FireVault"};
 data.settings.email=data.settings.email||{defaultTo:"",cc:"",subjectPrefix:"FireVault Report",signature:""};
 data.settings.app=data.settings.app||{defaultScreen:"home",distanceUnit:"feet",theme:"dark",confirmDeletes:true,autoBackupReminder:true};
 return data.settings;
}
ensureSettings();
function save(){ensureSettings();localStorage.setItem(KEY,JSON.stringify(data))}function loadActive(){const raw=localStorage.getItem(ACTIVE);if(raw){try{return JSON.parse(raw)}catch(e){}}return null}function saveActive(){activeJob?localStorage.setItem(ACTIVE,JSON.stringify(activeJob)):localStorage.removeItem(ACTIVE)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function stampFireVaultPhoto(dataUrl, siteName, cb){
 const cfg=ensureSettings().overlay;
 const img=new Image();
 img.onload=function(){
   try{
     const canvas=document.createElement("canvas");
     const maxW=1400;
     const scale=Math.min(1,maxW/img.width);
     canvas.width=Math.round(img.width*scale);
     canvas.height=Math.round(img.height*scale);
     const ctx=canvas.getContext("2d");
     ctx.drawImage(img,0,0,canvas.width,canvas.height);

     const sizeMap={small:.12,medium:.15,large:.19};
     const barH=Math.max(78,Math.round(canvas.height*(sizeMap[cfg.fontSize]||.15)));
     const y=cfg.alignment==="top"?0:canvas.height-barH;
     const grad=ctx.createLinearGradient(0,y,canvas.width,y);
     grad.addColorStop(0,"rgba(0,0,0,.86)");
     grad.addColorStop(.65,"rgba(0,0,0,.66)");
     grad.addColorStop(1,"rgba(120,0,0,.62)");
     ctx.fillStyle=grad;
     ctx.fillRect(0,y,canvas.width,barH);

     const pad=Math.round(canvas.width*0.035);
     const accent=cfg.accentColor||"#ef4444";
     const textColor=cfg.textColor||"#ffffff";

     if(cfg.showLogo!==false){
       const logo=Math.round(barH*.52);
       const lx=pad, ly=y+Math.round((barH-logo)/2);
       ctx.fillStyle=accent;
       ctx.fillRect(lx,ly,logo,logo);
       ctx.fillStyle="#fff";
       ctx.textAlign="center";
       ctx.textBaseline="middle";
       ctx.font="900 "+Math.round(logo*.46)+"px Arial";
       ctx.fillText("F",lx+logo/2,ly+logo/2);
       ctx.textAlign="left";
       ctx.textBaseline="alphabetic";
       ctx.font="900 "+Math.round(barH*.26)+"px Arial";
       ctx.fillStyle=textColor;
       ctx.fillText("FIRE",lx+logo+16,y+Math.round(barH*.46));
       const fireW=ctx.measureText("FIRE").width;
       ctx.fillStyle=accent;
       ctx.fillText("VAULT",lx+logo+16+fireW+5,y+Math.round(barH*.46));
       if(cfg.showTagline!==false){
         ctx.font="600 "+Math.round(barH*.12)+"px Arial";
         ctx.fillStyle="rgba(255,255,255,.84)";
         ctx.fillText("DOCUMENT. TRACK. PROTECT.",lx+logo+16,y+Math.round(barH*.68));
       }
     }

     const now=new Date();
     const currentSite=site()?ensureArrays(site()):{};
     const fieldMap={
       site:"Site: "+(siteName||"Unknown Site"),
       date:"Date: "+now.toLocaleDateString([], {year:"numeric",month:"short",day:"numeric"}),
       time:"Time: "+now.toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}),
       panel:"Panel: "+[((currentSite&&currentSite.panelManufacturer)||""),((currentSite&&currentSite.panelModel)||"")].filter(Boolean).join(" "),
       address:"Address: "+(currentSite?fullAddress(currentSite):""),
       gps:"GPS: "+(currentSite&&currentSite.lat&&currentSite.lng?(currentSite.lat+", "+currentSite.lng):"Not set")
     };
     const lines=(cfg.fields||["site","date","time"]).map(function(k){return fieldMap[k]}).filter(Boolean);
     ctx.textAlign="right";
     ctx.fillStyle=textColor;
     const mainFont=Math.round(barH*(cfg.fontSize==="large"?.20:cfg.fontSize==="small"?.14:.17));
     ctx.font="800 "+mainFont+"px Arial";
     const startY=y+Math.round(barH*.34);
     const gap=Math.round(mainFont*1.25);
     lines.slice(0,3).forEach(function(line,i){
       ctx.fillText(line,canvas.width-pad,startY+(i*gap));
     });

     cb(canvas.toDataURL("image/jpeg",0.88));
   }catch(err){
     console.warn("Photo stamp failed",err);
     cb(dataUrl);
   }
 };
 img.onerror=function(){cb(dataUrl)};
 img.src=dataUrl;
}

function stampFireVaultPhoto(dataUrl, siteName, cb){
 const img=new Image();
 img.onload=function(){
   try{
     const canvas=document.createElement("canvas");
     const maxW=1400;
     const scale=Math.min(1,maxW/img.width);
     canvas.width=Math.round(img.width*scale);
     canvas.height=Math.round(img.height*scale);
     const ctx=canvas.getContext("2d");
     ctx.drawImage(img,0,0,canvas.width,canvas.height);
     const barH=Math.max(92,Math.round(canvas.height*0.15));
     const y=canvas.height-barH;
     const grad=ctx.createLinearGradient(0,y,canvas.width,y);
     grad.addColorStop(0,"rgba(0,0,0,.86)");
     grad.addColorStop(.65,"rgba(0,0,0,.66)");
     grad.addColorStop(1,"rgba(120,0,0,.62)");
     ctx.fillStyle=grad;
     ctx.fillRect(0,y,canvas.width,barH);
     const pad=Math.round(canvas.width*0.035);
     const logo=Math.round(barH*.52);
     const lx=pad, ly=y+Math.round((barH-logo)/2);
     ctx.fillStyle="#ef4444";
     ctx.fillRect(lx,ly,logo,logo);
     ctx.fillStyle="#fff";
     ctx.textAlign="center";
     ctx.textBaseline="middle";
     ctx.font="900 "+Math.round(logo*.46)+"px Arial";
     ctx.fillText("F",lx+logo/2,ly+logo/2);
     ctx.textAlign="left";
     ctx.textBaseline="alphabetic";
     ctx.font="900 "+Math.round(barH*.26)+"px Arial";
     ctx.fillStyle="#fff";
     ctx.fillText("FIRE",lx+logo+16,y+Math.round(barH*.46));
     const fireW=ctx.measureText("FIRE").width;
     ctx.fillStyle="#ef4444";
     ctx.fillText("VAULT",lx+logo+16+fireW+5,y+Math.round(barH*.46));
     ctx.font="600 "+Math.round(barH*.12)+"px Arial";
     ctx.fillStyle="rgba(255,255,255,.84)";
     ctx.fillText("DOCUMENT. TRACK. PROTECT.",lx+logo+16,y+Math.round(barH*.68));
     const dateText=new Date().toLocaleString([], {year:"numeric",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
     ctx.textAlign="right";
     ctx.font="800 "+Math.round(barH*.18)+"px Arial";
     ctx.fillStyle="#fff";
     ctx.fillText("Site: "+(siteName||"Unknown Site"),canvas.width-pad,y+Math.round(barH*.42));
     ctx.font="700 "+Math.round(barH*.16)+"px Arial";
     ctx.fillText("Date: "+dateText,canvas.width-pad,y+Math.round(barH*.66));
     cb(canvas.toDataURL("image/jpeg",0.88));
   }catch(err){
     console.warn("Photo stamp failed",err);
     cb(dataUrl);
   }
 };
 img.onerror=function(){cb(dataUrl)};
 img.src=dataUrl;
}

function app(html){document.getElementById("app").innerHTML=html;active();if(view==="job")startTick();else stopTick()}function active(){document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));let n=document.getElementById("nav-"+(["site","form","visits","issues","equipment","equipmentForm","access","accessForm","docs","docForm","job"].includes(view)?"sites":view));if(n)n.classList.add("active")}
function go(v){view=v;mode=null;render()}function site(){return data.sites.find(s=>s.id===selected)}function siteById(id){return data.sites.find(s=>s.id===id)}
function ensureArrays(s){if(!s)return s;s.visits=s.visits||[];s.knownIssues=s.knownIssues||[];s.equipment=s.equipment||[];s.contacts=s.contacts||[];s.docs=s.docs||[];s.deficiencies=s.deficiencies||[];s.tasks=s.tasks||[];return s}
function render(){({home,sites,library,settings,site:siteDash,form,visits,issues,equipment,equipmentForm,access,accessForm,docs,docForm,job,importer,knowledge,report,timecard,templates,deficiencies,deficiencyForm,resourceForm,siteResources,tasks,taskForm}[view]||home)()}function val(id){return document.getElementById(id).value.trim()}
function fullAddress(s){
  const structured=[s.street,s.city,s.state,s.zip].filter(Boolean).join(", ");
  return structured || s.address || "No address entered";
}
function shortCityState(s){
  return [s.city,s.state,s.zip].filter(Boolean).join(", ");
}
function resourceMatchesSite(r,s){
  const hay=JSON.stringify(r||{}).toLowerCase();
  const make=(s.panelManufacturer||"").toLowerCase();
  const model=(s.panelModel||"").toLowerCase();
  return (make && hay.includes(make)) || (model && hay.includes(model));
}
function matchingResources(s){
  return (data.resources||[]).map((r,idx)=>({r,idx})).filter(x=>resourceMatchesSite(x.r,s));
}
function mapQuery(s){
  if(s.lat&&s.lng)return `${s.lat},${s.lng}`;
  return encodeURIComponent(fullAddress(s));
}
function openMapForSite(siteId){
  const s=ensureArrays(siteById(siteId)||site());
  if(!s)return;
  const q=mapQuery(s);
  window.open(`https://maps.apple.com/?q=${q}`,"_blank");
}
function openGoogleMapForSite(siteId){
  const s=ensureArrays(siteById(siteId)||site());
  if(!s)return;
  const q=mapQuery(s);
  window.open(`https://www.google.com/maps/search/?api=1&query=${q}`,"_blank");
}
function getLocation(cb){
 if(!navigator.geolocation){alert("GPS is not available in this browser.");return}
 navigator.geolocation.getCurrentPosition(pos=>cb(pos.coords.latitude,pos.coords.longitude),err=>alert("GPS permission/location failed: "+err.message),{enableHighAccuracy:true,timeout:12000,maximumAge:30000})
}
function distanceFeet(a,b,c,d){
 if(!a||!b||!c||!d)return null;
 const R=6371000, toRad=x=>x*Math.PI/180;
 const dLat=toRad(c-a), dLon=toRad(d-b);
 const x=Math.sin(dLat/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)**2;
 return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*3.28084);
}
function findNearby(lat,lng){
 return data.sites.map(s=>({s,ft:distanceFeet(lat,lng,Number(s.lat),Number(s.lng))})).filter(x=>x.ft!==null).sort((a,b)=>a.ft-b.ft);
}
function fmtTime(iso){return new Date(iso).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}function elapsed(start){let ms=Date.now()-new Date(start).getTime();let h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return h?`${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`:`${m}:${String(s).padStart(2,"0")}`}
function startTick(){stopTick();timer=setInterval(()=>{let e=document.getElementById("elapsed");if(e&&activeJob)e.textContent=elapsed(activeJob.startedAt)},1000)}function stopTick(){if(timer){clearInterval(timer);timer=null}}

function home(){const visits=data.sites.flatMap(s=>(s.visits||[]).map(v=>({...v,site:s.name}))).sort((a,b)=>(b.date||"").localeCompare(a.date||""));const issueCount=data.sites.reduce((a,s)=>a+(s.knownIssues||[]).length,0);const taskCount=data.sites.reduce((a,s)=>a+(s.tasks||[]).filter(t=>(t.status||"Open")!=="Done").length,0);let jobHtml=activeJob?`<div class="card jobBanner"><div class="row"><div><h2>Service Call Active</h2><p>${esc(activeJob.siteName)} • <span id="elapsed">${elapsed(activeJob.startedAt)}</span></p></div><button class="primary" onclick="selected='${activeJob.siteId}';view='job';render()">Open</button></div></div>`:"";
app(`<div class="screen"><div><h1>Today</h1><p>Fast service-call workflow for fire alarm technicians.</p></div>${jobHtml}<div class="grid3"><div class="card tile"><strong>${data.sites.length}</strong><span>Sites</span></div><div class="card tile"><strong>${issueCount}</strong><span>Issues</span></div><div class="card tile"><strong>${taskCount}</strong><span>Open Tasks</span></div></div><div class="grid2"><button class="primary tile" onclick="checkNearby()"><strong>📍 Nearby Site</strong><span>Use GPS to match location</span></button><button class="ghost tile" onclick="newSite()"><strong>＋ Add Site</strong><span>Create customer vault</span></button></div><div class="grid2"><button class="ghost tile" onclick="view='knowledge';render()"><strong>🔎 Knowledge Search</strong><span>Search every site note</span></button><button class="ghost tile" onclick="view='timecard';render()"><strong>⏱ Timecard</strong><span>Daily work summary</span></button></div><div id="nearbyBox"></div><div class="card grow"><div class="row"><h2>Recent Visits</h2><button class="ghost" onclick="go('sites')">Open Sites</button></div><div class="list">${visits.length?visits.slice(0,4).map(v=>`<div class="card tight visit"><strong>${esc(v.site)}</strong><p>${esc(v.summary)}</p><span class="pill">${esc(v.date)}</span></div>`).join(""):`<div class="empty">No visits yet.</div>`}</div></div></div>`)}
function checkNearby(){
 const box=document.getElementById("nearbyBox");
 if(box)box.innerHTML='<div class="card">Checking GPS...</div>';
 getLocation((lat,lng)=>{
   const near=findNearby(lat,lng).slice(0,3);
   if(!box)return;
   if(!near.length){box.innerHTML='<div class="card"><h2>No GPS site match</h2><p>Add GPS coordinates to customer sites using Edit Site → Use Current GPS.</p></div>';return}
   box.innerHTML=`<div class="card jobBanner"><h2>Nearby Sites</h2>${near.map(x=>`<div class="card tight siteItem" onclick="openSite('${x.s.id}')"><strong>${esc(x.s.name)}</strong><p>${x.ft} ft away</p></div>`).join("")}</div>`;
 })
}
function sites(){app(`<div class="screen"><div class="row"><div><h1>Sites</h1><p>Open a customer vault or start a service call.</p></div><div class="row"><button class="ghost" onclick="view='importer';render()">Import</button><button class="primary" onclick="newSite()">＋ Add</button></div></div><input class="search" id="q" placeholder="Search site, city, panel, doc, contact, issue..." oninput="filter()"><div id="siteList" class="list grow">${siteList(data.sites)}</div></div>`)}
function siteList(list){if(!list.length)return `<div class="empty">No sites yet. Tap Add.</div>`;return list.map(s=>{ensureArrays(s);return `<div class="card siteItem" onclick="openSite('${s.id}')"><div class="row"><h2>${esc(s.name)}</h2><span class="pill">${esc(s.panelManufacturer||"Panel TBD")}</span></div><p>${esc(fullAddress(s))}</p><span class="pill">${esc(s.panelModel||"Model TBD")}</span><span class="pill">Visits ${s.visits.length}</span><span class="pill">Issues ${s.knownIssues.length}</span><span class="pill">Docs ${s.docs.length}</span><span class="pill">Def ${s.deficiencies.length}</span><span class="pill">Tasks ${s.tasks.length}</span></div>`}).join("")}
function filter(){let q=val("q").toLowerCase();document.getElementById("siteList").innerHTML=siteList(data.sites.filter(s=>JSON.stringify(s).toLowerCase().includes(q)))}function newSite(){selected=null;view="form";render()}function openSite(id){selected=id;ensureArrays(site());view="site";render()}

function siteDash(){const s=ensureArrays(site());if(!s)return go("sites");let isActive=activeJob&&activeJob.siteId===s.id;app(`<div class="screen"><div class="row"><button class="back ghost" onclick="go('sites')">←</button><button class="ghost" onclick="editSite()">Edit</button></div><div class="card redline"><h1>${esc(s.name)}</h1><p>${esc(fullAddress(s))}</p><span class="pill">🔥 ${esc(s.panelManufacturer||"Manufacturer TBD")}</span><span class="pill">${esc(s.panelModel||"Model TBD")}</span></div><button class="${isActive?'success':'primary'} tile" onclick="${isActive?"view='job';render()":"startJob()"}"><strong>${isActive?'OPEN ACTIVE CALL':'▶ START SERVICE CALL'}</strong><span>${isActive?'Timer is running':'Create live timeline and arrival timestamp'}</span></button><div class="grid2"><button class="tile" onclick="view='visits';render()"><strong>Visits</strong><span>${s.visits.length} records</span></button><button class="tile" onclick="view='issues';render()"><strong>Known Issues</strong><span>${s.knownIssues.length} items</span></button><button class="tile" onclick="view='equipment';render()"><strong>Equipment</strong><span>${s.equipment.length} records</span></button><button class="tile" onclick="view='docs';render()"><strong>Docs / Photos</strong><span>${s.docs.length} records</span></button></div><div class="card grow"><h2>Site Snapshot</h2><p><strong>FACP:</strong> ${esc(s.facpLocation||"Not entered")}</p><p><strong>Monitoring:</strong> ${esc(s.monitoring||"Not entered")}</p><p><strong>City/State:</strong> ${esc(shortCityState(s)||"Not entered")}</p><p><strong>GPS:</strong> ${s.lat&&s.lng?esc(s.lat+", "+s.lng):"Not set"}</p><p><strong>Matched Resources:</strong> ${matchingResources(s).length}</p><p><strong>Known Issues:</strong> ${s.knownIssues.length?s.knownIssues.slice(0,2).map(i=>i.text).join(" / "):"None"}</p></div></div>`)}
function startJob(){const s=ensureArrays(site());if(activeJob&&!confirm("Another service call is active. Replace it?"))return;
 const begin=(lat,lng)=>{activeJob={id:uid(),siteId:s.id,siteName:s.name,startedAt:new Date().toISOString(),lat:lat||"",lng:lng||"",events:[{id:uid(),time:new Date().toISOString(),type:"Arrived",text:lat?`Service call started at GPS ${lat.toFixed(5)}, ${lng.toFixed(5)}`:"Service call started"}]};saveActive();view="job";render()}
 if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>begin(pos.coords.latitude,pos.coords.longitude),()=>begin(null,null),{enableHighAccuracy:true,timeout:8000,maximumAge:30000})}else begin(null,null)
}
function job(){const s=ensureArrays(siteById(activeJob?activeJob.siteId:selected));if(!activeJob||!s){activeJob=null;saveActive();return go("sites")}selected=s.id;app(`<div class="screen"><div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Job Mode</h1></div><div class="card jobBanner"><h1>${esc(s.name)}</h1><p>SERVICE CALL ACTIVE</p><div class="grid3"><div><span class="muted">Started</span><div><strong>${fmtTime(activeJob.startedAt)}</strong></div></div><div><span class="muted">Elapsed</span><div class="timer" id="elapsed">${elapsed(activeJob.startedAt)}</div></div><div><span class="muted">GPS</span><div><strong>${activeJob.lat?'Saved':'Manual'}</strong></div></div></div></div><div class="grid3"><button class="quick" onclick="quick('⚠ Ground Fault')">⚠<br>Ground</button><button class="quick" onclick="quick('🚨 NAC Trouble')">🚨<br>NAC</button><button class="quick" onclick="quick('🔋 Battery')">🔋<br>Battery</button><button class="quick" onclick="quick('💨 Smoke Detector')">💨<br>Smoke</button><button class="quick" onclick="quick('🚪 Pull Station')">🚪<br>Pull</button><button class="quick" onclick="quick('📡 Communicator')">📡<br>Comm</button><button class="quick" onclick="voiceNote()">🎤<br>Voice</button><button class="quick" onclick="view='templates';render()">📋<br>Templates</button><button class="quick" onclick="quick('✅ Test Passed')">✅<br>Passed</button></div><input id="jobPhotoInput" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleJobPhoto(event)"><div class="card grow"><div class="row"><h2>Live Timeline</h2><button class="danger" onclick="finishJob()">Finish</button></div><div class="list">${activeJob.events.map(e=>`<div class="card tight visit"><span class="eventTime">${fmtTime(e.time)}</span><strong>${esc(e.type)}</strong><p>${esc(e.text)}</p></div>`).join("")}</div></div></div>`)}
function quick(label){activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:label,text:label});saveActive();job()}
function customNote(){let t=prompt("Enter service note:");if(!t)return;activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:"Note",text:t});saveActive();job()}
function voiceNote(){
 const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SpeechRecognition){
   let t=prompt("Voice recognition is not available here. Type the note:");
   if(!t)return;
   activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:"🎤 Voice Note",text:t,tags:["Voice Note"]});
   saveActive();job();return;
 }
 const rec=new SpeechRecognition();
 rec.lang="en-US"; rec.interimResults=false; rec.maxAlternatives=1;
 alert("Voice note: speak after tapping OK.");
 rec.onresult=(event)=>{
   const text=event.results[0][0].transcript;
   activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:"🎤 Voice Note",text:text,tags:["Voice Note"]});
   saveActive();job();
 };
 rec.onerror=()=>{let t=prompt("Voice capture failed. Type the note:");if(t){activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:"🎤 Voice Note",text:t,tags:["Voice Note"]});saveActive();job();}};
 rec.start();
}
function handleJobPhoto(e){
 const file=e.target.files[0]; if(!file||!activeJob)return;
 const reader=new FileReader();
 reader.onload=function(){
   const s=ensureArrays(siteById(activeJob.siteId));
   stampFireVaultPhoto(reader.result, s.name, function(stamped){
     const title=prompt("Photo title:", "Service call photo") || "Service call photo";
     const doc={id:uid(),type:"Panel Photo",title:title,location:"Service Call",url:"",imageData:stamped,notes:"Captured during service call on "+new Date().toLocaleString(),createdAt:new Date().toISOString()};
     s.docs.unshift(doc);
     save();
     activeJob.events.unshift({id:uid(),time:new Date().toISOString(),type:"📷 Photo Added",text:title,docId:doc.id,tags:["Photo"]});
     saveActive();
     job();
   });
 };
 reader.readAsDataURL(file);
}
function finishJob(){const s=ensureArrays(siteById(activeJob.siteId));let end=new Date().toISOString();activeJob.events.unshift({id:uid(),time:end,type:"Departed",text:"Service call finished"});let summary=activeJob.events.slice().reverse().map(e=>`${fmtTime(e.time)} - ${e.text}`).join("\\n");s.visits.unshift({id:activeJob.id,date:new Date(activeJob.startedAt).toISOString().slice(0,10),summary:`Service call: ${elapsed(activeJob.startedAt)} on site\\n${summary}`,tags:["Service Call", ...Array.from(new Set(activeJob.events.flatMap(e=>e.tags||[])))],startedAt:activeJob.startedAt,endedAt:end,events:activeJob.events});save();activeJob=null;saveActive();alert("Service call saved to visit history.");view="visits";render()}


function addTemplateEvent(title,text,tags){

}

function saveDeficiency(){
 const s=ensureArrays(site());
 const obj={status:val("dstatus"),severity:val("dseverity"),system:val("dsystem"),location:val("dlocation"),description:val("ddescription"),recommendation:val("drecommendation"),updatedAt:new Date().toISOString()};
 if(!obj.description)return alert("Enter a deficiency description.");
 if(mode){let i=s.deficiencies.findIndex(x=>x.id===mode);s.deficiencies[i]={...s.deficiencies[i],...obj}}
 else{
   const def={...obj,id:uid(),date:new Date().toISOString().slice(0,10),createdAt:new Date().toISOString()};
   s.deficiencies.unshift(def);
   if(confirm("Create a follow-up task for this deficiency?")){
     s.tasks=s.tasks||[];
     s.tasks.unshift({id:uid(),title:"Correct deficiency: "+obj.description.slice(0,60),status:"Open",priority:obj.severity==="Critical"?"Critical":obj.severity==="High"?"High":"Normal",due:"",notes:obj.recommendation||"",createdAt:new Date().toISOString()});
   }
 }
 save();mode=null;view="deficiencies";render();
}

  <div class="row"><button class="back ghost" onclick="view='site';render()">←</button><h1>Docs / Photos</h1><button class="primary" onclick="mode=null;view='docForm';render()">＋ Add</button></div>

   ${s.docs.length?s.docs.map(function(d){return `<div class="card docLine">
    <div class="row"><h2>${esc(d.title||"Untitled")}</h2><button class="ghost" onclick="mode='${d.id}';view='docForm';render()">Edit</button></div>
    <span class="pill">${esc(d.type||"File")}</span>
    <span class="pill">${esc(d.location||"No location")}</span>
    <p>${esc(d.notes||"")}</p>
    ${d.imageData?`<img class="thumb" src="${esc(d.imageData)}" onclick="openImageViewer('${d.id}')"><button class="primary" onclick="openImageViewer('${d.id}')">View Image</button>`:""}
    ${d.url?`<a class="btn ghost" href="${esc(d.url)}" target="_blank">Open Link</a>`:""}
   </div>`}).join(""):`<div class="empty">No docs/photos yet. Add panel photos, riser diagrams, battery labels, maps, PDFs, or cloud links.</div>`}
  </div>
 </div>`)

function openImageViewer(docId){
 const s=ensureArrays(site()); if(!s)return go("sites");
 const d=s.docs.find(function(x){return x.id===docId});
 if(!d||!d.imageData){alert("No image found for this record.");return}
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="view='docs';render()">←</button><h1>${esc(d.title||"Image")}</h1></div>
  <div class="card grow" style="overflow:auto;padding:8px">
    <img src="${esc(d.imageData)}" style="display:block;width:100%;height:auto;border-radius:16px;border:1px solid rgba(255,255,255,.12)">
    <p>${esc(d.notes||"")}</p>
  </div>
 </div>`)
}
function docForm(){
 const s=ensureArrays(site()); if(!s)return go("sites");
 const d=mode?s.docs.find(function(x){return x.id===mode})||{}:{};
 currentDocImageData=d.imageData||"";
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="view='docs';render()">←</button><h1>${mode?"Edit File":"Add File"}</h1></div>
  <div class="form grow">
    <label>File Type</label>
    <select id="dtype">
      ${["Panel Photo","Trouble Screenshot","Riser Diagram","Map / Floor Plan","Battery Label","Inspection Report","Manual Link","Cloud File Link","Other"].map(function(t){return `<option ${d.type===t?"selected":""}>${t}</option>`}).join("")}
    </select>
    <label>Title</label>
    <input id="dtitle" value="${esc(d.title)}" placeholder="Title">
    <label>Location</label>
    <input id="dlocation" value="${esc(d.location)}" placeholder="Location">
    <label>URL / Link</label>
    <input id="durl" value="${esc(d.url)}" placeholder="URL / Link">
    <div class="photoBox">
      <label>Photo Upload</label>
      <input id="dfile" type="file" accept="image/*" onchange="previewPhoto(event)">
      <p class="muted">New photos are stamped with FireVault, site name, and date/time.</p>
      <img id="photoPreview" class="thumb" style="${d.imageData?'':'display:none'}" src="${esc(d.imageData||'')}">
      ${d.imageData?`<button class="ghost" onclick="openImageViewer('${d.id}')">View Saved Image</button>`:""}
    </div>
    <label>Notes</label>
    <textarea id="dnotes" placeholder="Notes">${esc(d.notes)}</textarea>
  </div>
  <div class="grid2">
    <button class="primary" onclick="saveDoc()">Save File</button>
    ${mode?`<button class="danger" onclick="deleteDoc()">Delete</button>`:`<button class="ghost" onclick="view='docs';render()">Cancel</button>`}
  </div>
 </div>`)
}
function previewPhoto(e){
 const file=e.target.files[0]; if(!file)return;
 const reader=new FileReader();
 reader.onload=function(){
   const s=site()?ensureArrays(site()):{name:"FireVault"};
   stampFireVaultPhoto(reader.result, s.name, function(stamped){
     currentDocImageData=stamped;
     const img=document.getElementById("photoPreview");
     if(img){img.src=currentDocImageData;img.style.display="block";}
   });
 };
 reader.readAsDataURL(file);
}
function saveDoc(){
 const s=ensureArrays(site());
 const obj={type:val("dtype"),title:val("dtitle"),location:val("dlocation"),url:val("durl"),imageData:currentDocImageData||"",notes:val("dnotes")};
 if(!obj.title)obj.title=obj.type||"Untitled File";
 if(mode){
   const i=s.docs.findIndex(function(x){return x.id===mode});
   if(i>=0)s.docs[i]={...s.docs[i],...obj,updatedAt:new Date().toISOString()};
 }else{
   s.docs.unshift({...obj,id:uid(),createdAt:new Date().toISOString()});
 }
 save();
 mode=null;
 currentDocImageData="";
 view="docs";
 render();
}
function deleteDoc(){
 const s=ensureArrays(site());
 if(!mode)return;
 const d=s.docs.find(function(x){return x.id===mode});
 if(!confirm('Delete "'+((d&&d.title)||"this file")+'"?'))return;
 s.docs=s.docs.filter(function(x){return x.id!==mode});
 save();
 mode=null;
 currentDocImageData="";
 view="docs";
 render();
}

function resourceList(list){
 if(!list.length)return `<div class="empty">No resources yet. Add a manufacturer or panel note.</div>`;
 return list.map((r,idx)=>resourceCard(r,idx)).join("");
}
function filterResources(){
 const q=val("rq").toLowerCase();
 document.getElementById("resourceList").innerHTML=resourceList((data.resources||[]).filter(r=>JSON.stringify(r).toLowerCase().includes(q)));
}
function resourceForm(){
 const r=mode!==null && data.resources[Number(mode)] ? data.resources[Number(mode)] : {};
 app(`<div class="screen">
  <div class="row"><button class="back ghost" onclick="go('library')">←</button><h1>${mode!==null?"Edit Resource":"Add Resource"}</h1></div>
  <div class="form grow">
    <div><label>Manufacturer</label><input id="rm" value="${esc(r.m||r.manufacturer)}" placeholder="Fire-Lite, Notifier, EST..."></div>

    <div><label>URL / Manual Link</label><input id="rurl" value="${esc(r.url)}" placeholder="Optional link to manual or reference"></div>
    <div><label>Notes / Cheat Sheet</label><textarea id="rn" placeholder="Programming notes, reset steps, trouble code tips...">${esc(r.n||r.notes)}</textarea></div>
  </div>
  <button class="primary" onclick="saveResource()">Save Resource</button>
 </div>`)
}
function saveResource(){
 const obj={m:val("rm")||"Unknown Manufacturer",panel:val("rpanel"),url:val("rurl"),n:val("rn"),updatedAt:new Date().toISOString()};
 data.resources=data.resources||[];
 if(mode!==null && data.resources[Number(mode)]) data.resources[Number(mode)]={...data.resources[Number(mode)],...obj};
 else data.resources.unshift({...obj,id:uid(),createdAt:new Date().toISOString()});
 save();mode=null;if(selected){view="siteResources";render()}else{go("library")}
}

function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="firevault-backup-build-0.27.1.json";a.click()}
function importData(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();alert("Imported.");go("home")}catch(err){alert("Import failed.")}};r.readAsText(f)}
function resetData(){if(confirm("Clear all local FireVault data?")){localStorage.removeItem(KEY);localStorage.removeItem(ACTIVE);data=load();activeJob=null;go("home")}}
