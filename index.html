    window.fireVaultRecordSupportError0900 = function(error, context){

        var payload = {at:new Date().toISOString(), build:"1.03.28", context:context || "runtime", detail:detail.slice(0,12000)};

  <script>
    window.FIREVAULT_BUILD = "1.03.28";
    window.FIREVAULT_UPDATE = { registration:null, waiting:null, checking:false, activating:false, reloading:false };
    window.fireVaultReloadForUpdate = function(){
      if(window.FIREVAULT_UPDATE.reloading)return;
      window.FIREVAULT_UPDATE.reloading=true;
      const status=document.getElementById("fvUpdateStatus072");
      if(status)status.textContent="Update installed. Reopening FireVault…";
      setTimeout(function(){ location.reload(); },120);
    };
    window.fireVaultCheckForUpdates = async function(options){
      options = options || {};
      if (!("serviceWorker" in navigator)) return {supported:false};
      if (window.FIREVAULT_UPDATE.checking) return {checking:true};
      window.FIREVAULT_UPDATE.checking = true;
      try {
        const reg = window.FIREVAULT_UPDATE.registration || await navigator.serviceWorker.ready;
        window.FIREVAULT_UPDATE.registration = reg;
        await reg.update();
        const response = await fetch("version.json?t=" + Date.now(), {cache:"no-store"});
        const remote = response.ok ? await response.json() : {};
        const newer = remote.build && remote.build !== window.FIREVAULT_BUILD;
        if (reg.waiting) window.fireVaultShowUpdate(reg.waiting, remote.build || "new version");
        else if (newer && options.reloadWhenNew) location.reload();
        return {supported:true,newer:newer,remote:remote.build||window.FIREVAULT_BUILD};
      } finally { window.FIREVAULT_UPDATE.checking = false; }
    };
    window.fireVaultShowUpdate = function(worker, build){
      window.FIREVAULT_UPDATE.waiting = worker;
      const existing=document.getElementById("fvUpdateBanner072");
      if (existing) {
        const buildLabel=existing.querySelector("#fvUpdateBuild072");
        if(buildLabel) buildLabel.textContent=String(build||"A newer build");
        const status=existing.querySelector("#fvUpdateStatus072");
        if(status && !window.FIREVAULT_UPDATE.activating)status.textContent="The update is ready. Your saved FireVault data will stay on this device.";
        return;
      }
      const banner=document.createElement("div");
      banner.id="fvUpdateBanner072";
      banner.setAttribute("role","dialog");
      banner.setAttribute("aria-labelledby","fvUpdateTitle072");
      banner.setAttribute("aria-describedby","fvUpdateDescription072 fvUpdateStatus072");
      banner.innerHTML='<section class="fvUpdateDialog1033"><div class="fvUpdateIcon1015" aria-hidden="true"><svg viewBox="0 0 64 64"><path class="fvUpdateShield1033" d="M32 5 53 13v16c0 14-8.3 24.3-21 30C19.3 53.3 11 43 11 29V13z"/><path class="fvUpdateCheck1033" d="m21.5 31.5 7 7 14-16"/></svg></div><div class="fvUpdateCopy1015"><span>APP UPDATE</span><strong id="fvUpdateTitle072">Update Ready</strong><div class="fvUpdateSafe1033"><i>✓</i> Safe to install</div><p id="fvUpdateDescription072"><b id="fvUpdateBuild072"></b> includes the latest fixes and improvements. FireVault will reopen when installation finishes.</p><div class="fvUpdateProtection1033"><span>✓</span><p><strong>Your data is protected</strong><small>Accounts, notes, photos, and settings stay on this device.</small></p></div></div><div class="fvUpdateActions1015"><button id="fvUpdateNow072"><span aria-hidden="true">⇩</span> Install Update</button><div class="fvUpdateSecondary1033"><button id="fvUpdateNotes1033"><span aria-hidden="true">▤</span> Release Notes</button><button id="fvUpdateLater072"><span aria-hidden="true">◷</span> Later</button></div></div><div class="fvUpdateRecovery1033"><span aria-hidden="true">ⓘ</span><small id="fvUpdateStatus072" aria-live="polite">If installation stalls, Reload App will remain available.</small></div></section>';
      document.body.appendChild(banner);
      document.body.classList.add("fvUpdateModalOpen1033");
      document.getElementById("fvUpdateBuild072").textContent=String(build||"A newer build");
      const updateButton=document.getElementById("fvUpdateNow072");
      const laterButton=document.getElementById("fvUpdateLater072");
      const notesButton=document.getElementById("fvUpdateNotes1033");
      const status=document.getElementById("fvUpdateStatus072");
      let installTimer=0;
      let watchedWorker=null;
      const dismiss=function(){ if(installTimer)clearTimeout(installTimer);window.FIREVAULT_UPDATE.activating=false;document.body.classList.remove("fvUpdateModalOpen1033");banner.remove(); };
      banner.addEventListener("click",function(event){
        if(event.target===banner && !window.FIREVAULT_UPDATE.activating)dismiss();
      });
      const showRecovery=function(message){
        if(installTimer)clearTimeout(installTimer);installTimer=0;
        window.FIREVAULT_UPDATE.activating=false;
        banner.classList.remove("isInstalling1015");banner.classList.add("isRecovery1033");banner.removeAttribute("aria-busy");
        updateButton.disabled=false;laterButton.disabled=false;notesButton.disabled=false;
        updateButton.textContent="Try Again";laterButton.textContent="Reload App";
        laterButton.onclick=window.fireVaultReloadForUpdate;
        status.textContent=message||"The update did not finish. Try again or reload FireVault.";
      };
      const watchWorker=function(activeWorker){
        if(!activeWorker || watchedWorker===activeWorker)return;
        watchedWorker=activeWorker;
        activeWorker.addEventListener("statechange",function(){
          if(activeWorker.state==="activated")window.fireVaultReloadForUpdate();
          else if(activeWorker.state==="redundant")showRecovery("The update was replaced before it finished. Try again to use the newest files.");
        });
      };
      const install=function(){
        const registration=window.FIREVAULT_UPDATE.registration;
        const activeWorker=registration?.waiting || window.FIREVAULT_UPDATE.waiting;
        if(!activeWorker){showRecovery("The waiting update is no longer available. Reload FireVault, then check for updates again.");return;}
        if(activeWorker.state==="activated"){window.fireVaultReloadForUpdate();return;}
        if(activeWorker.state==="redundant"){showRecovery("That update is no longer active. Try again to check for the newest version.");return;}
        if(window.FIREVAULT_UPDATE.activating)return;
        window.FIREVAULT_UPDATE.waiting=activeWorker;
        window.FIREVAULT_UPDATE.activating=true;
        watchWorker(activeWorker);
        banner.classList.remove("isRecovery1033");banner.classList.add("isInstalling1015");
        banner.setAttribute("aria-busy","true");
        updateButton.disabled=true;
        laterButton.disabled=true;
        notesButton.disabled=true;
        updateButton.textContent="Installing…";
        status.textContent="Installing the update. FireVault will reopen automatically.";
        try{activeWorker.postMessage({type:"SKIP_WAITING"});}
        catch(error){
          showRecovery("The update could not start. Check your connection and try again.");
          return;
        }
        installTimer=setTimeout(function(){
          if(!document.body.contains(banner))return;
          showRecovery("The update is taking longer than expected. Try again or reload FireVault; the controls will remain available.");
        },8000);
      };
      updateButton.onclick=install;
      laterButton.onclick=dismiss;
      notesButton.onclick=function(){dismiss();if(typeof window.fireVaultOpenReleaseNotes==="function")window.fireVaultOpenReleaseNotes();else document.getElementById("homeBell478")?.click();};
      watchWorker(worker);
      requestAnimationFrame(function(){updateButton.focus();});
    };
    window.fireVaultClearAppCache = async function(){
      if ("caches" in window) { const names=await caches.keys(); await Promise.all(names.map(n=>caches.delete(n))); }
      if ("serviceWorker" in navigator) { const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.update())); }
      return true;
    };
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.addEventListener("controllerchange", function(){
        window.fireVaultReloadForUpdate();
      });
      window.addEventListener("load", async function(){
        try {
          const reg=await navigator.serviceWorker.register("sw.js?v=1.03.28", {scope:"./", updateViaCache:"none"});
          window.FIREVAULT_UPDATE.registration=reg;
          if (reg.waiting) window.fireVaultShowUpdate(reg.waiting,"1.03.28");
          reg.addEventListener("updatefound", function(){
            const worker=reg.installing; if(!worker)return;
            worker.addEventListener("statechange", function(){
              if(worker.state==="installed" && navigator.serviceWorker.controller) window.fireVaultShowUpdate(worker,"latest");
            });
          });
          try {
            const updateResult=await window.fireVaultCheckForUpdates({reloadWhenNew:false});
            window.fireVaultSplashVersionReady0732(updateResult && updateResult.newer ? "UPDATE READY" : "CURRENT");
          } catch(updateError) {
            window.fireVaultSplashVersionReady0732("OFFLINE READY");
          }
        } catch(e) { window.fireVaultSplashVersionReady0732("OFFLINE READY"); }
      });
    } else {
      window.addEventListener("load",function(){ window.fireVaultSplashVersionReady0732("BROWSER MODE"); });
    }
  </script>
